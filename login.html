<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Editor</title><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body><header><div class="logo-container">
<img src="Logo.png" alt="Logo">
</div><div class="header-actions"><button class="icon-btn" onclick="beautifyCode()">
<i class="fas fa-magic"></i>
</button><button class="icon-btn" onclick="exportCode()">
<i class="fas fa-download"></i>
</button><button id="run-btn" class="icon-btn run-btn" onclick="runCode()">
<i class="fas fa-play"></i> RUN
</button><button class="icon-btn" onclick="toggleSettings()">
<i class="fas fa-sliders-h"></i>
</button></div></header><div id="shutter-trigger" onclick="toggleShutter()">
<i class="fas fa-chevron-right"></i>
</div><main class="main-container">
<div id="editor-grid" class="editor-grid"></div>
</main><div id="shutter" class="shutter"><div class="shutter-header"><h3>TASKBAR</h3><i class="fas fa-times" onclick="toggleShutter()"></i>

</div><div class="shutter-list"><button class="add-btn" onclick="addNewFilePrompt()">
<i class="fas fa-plus"></i> NEW FILE
</button><div id="shutter-file-list"></div></div></div><div id="settingsPanel" class="settings-panel"><h3>IDE Settings</h3><button onclick="toggleSettings()">CLOSE</button>

</div><div id="preview-overlay" class="preview-overlay"><div class="overlay-header"><div style="display:flex; gap:10px;"><button class="icon-btn" onclick="refreshPreview()">
<i class="fas fa-sync-alt"></i>
</button><button class="icon-btn" onclick="setPreviewSize('100%')">
<i class="fas fa-desktop"></i>
</button><button class="icon-btn" onclick="setPreviewSize('375px')">
<i class="fas fa-mobile-alt"></i>
</button><button onclick="closePreview()" class="icon-btn">
CLOSE
</button></div></div><div id="preview-body"><iframe id="output-frame"></iframe></div></div><script src="theme-settings.js"></script><script src="main-logic.js"></script><script src="script2.js"></script></body>
</html>
