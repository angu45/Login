    int sum = 0;
    for (int i = 1; i <= 10; i++) {
        sum += i;
    }
    printf("Sum of 1 to 10 = %d\\n", sum);
    
    return 0;
}`;

let files = [{ name: 'main.c', content: DEFAULT_CODE }];
let activeFileIdx = 0;
let settings = {
  fontSize: 14,
  fontFamily: 'JetBrains Mono',
  theme: 'dark',
  lineNumbers: true,
  wordWrap: false,
  autoSave: true
};
let isCompiling = false;

let autocompleteContainer = null;
let autocompleteSelectedIdx = -1;
let lastAutocompleteQuery = '';

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightC(code) {
  // Tokenize and highlight
  let result = '';
  let i = 0;
  const len = code.length;

  while (i < len) {
    // Comments
    if (code[i] === '/' && code[i+1] === '/') {
      let end = code.indexOf('\n', i);
      if (end === -1) end = len;
      result += `<span class="comment">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    if (code[i] === '/' && code[i+1] === '*') {
      let end = code.indexOf('*/', i+2);
      if (end === -1) end = len; else end += 2;
      result += `<span class="comment">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // Preprocessor
    if (code[i] === '#' && (i === 0 || code[i-1] === '\n')) {
      let end = i;
      while (end < len && code[end] !== '\n') end++;
      result += `<span class="preproc">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // Strings
    if (code[i] === '"') {
      let end = i+1;
      while (end < len && code[end] !== '"') { if (code[end] === '\\') end++; end++; }
      if (end < len) end++;
      result += `<span class="string-lit">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // Char literals
    if (code[i] === "'") {
      let end = i+1;
      while (end < len && code[end] !== "'") { if (code[end] === '\\') end++; end++; }
      if (end < len) end++;
      result += `<span class="char-lit">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // Numbers
    if (/[0-9]/.test(code[i]) && (i === 0 || /[\s\(\),;=+\-*\/%<>!&|^~\[{]/.test(code[i-1]))) {
      let end = i;
      while (end < len && /[0-9a-fA-FxX.]/.test(code[end])) end++;
      result += `<span class="number-lit">${escapeHtml(code.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // Identifiers / keywords
    if (/[a-zA-Z_]/.test(code[i])) {
      let end = i;
      while (end < len && /[a-zA-Z0-9_]/.test(code[end])) end++;
      const word = code.slice(i, end);
      // Check if function call
      let afterWord = end;
      while (afterWord < len && code[afterWord] === ' ') afterWord++;
      if (C_KEYWORDS.has(word)) {
        result += `<span class="keyword">${escapeHtml(word)}</span>`;
      } else if (C_TYPES.has(word)) {
        result += `<span class="type-kw">${escapeHtml(word)}</span>`;
      } else if (afterWord < len && code[afterWord] === '(') {
        result += `<span class="func-call">${escapeHtml(word)}</span>`;
      } else {
        result += escapeHtml(word);
      }
      i = end;
      continue;
    }
    // Punctuation
    if (/[{}()\[\];,.]/.test(code[i])) {
      result += `<span class="punctuation">${escapeHtml(code[i])}</span>`;
      i++;
      continue;
    }
    // Default
    result += escapeHtml(code[i]);
    i++;
  }
  return result;
}

// ==================== EDITOR ====================
function updateEditor() {
  const code = codeInput.value;
  highlightOverlay.innerHTML = highlightC(code) + '\n';
  updateLineNumbers(code);
}

function updateLineNumbers(code) {
  if (!settings.lineNumbers) {
    lineNumbers.style.display = 'none';
    return;
  }
  lineNumbers.style.display = 'block';
  const lines = code.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) {
    html += `<div>${i}</div>`;
  }
  lineNumbers.innerHTML = html;
}

function syncScroll() {
  highlightOverlay.scrollTop = codeInput.scrollTop;
  highlightOverlay.scrollLeft = codeInput.scrollLeft;
  lineNumbers.scrollTop = codeInput.scrollTop;
}

codeInput.addEventListener('input', () => {
  files[activeFileIdx].content = codeInput.value;
  updateEditor();
  showAutocomplete();
  if (settings.autoSave) saveToStorage();
});
codeInput.addEventListener('scroll', syncScroll);

// Tab key support
codeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = codeInput.selectionStart;
    const end = codeInput.selectionEnd;
    codeInput.value = codeInput.value.substring(0, start) + '    ' + codeInput.value.substring(end);
    codeInput.selectionStart = codeInput.selectionEnd = start + 4;
    codeInput.dispatchEvent(new Event('input'));
  }
  // Autocomplete selection
  if (autocompleteContainer && autocompleteContainer.style.display !== 'none') {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const items = autocompleteContainer.querySelectorAll('.autocomplete-item');
      autocompleteSelectedIdx = Math.min(autocompleteSelectedIdx + 1, items.length - 1);
      updateAutocompleteSelection(items);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      autocompleteSelectedIdx = Math.max(autocompleteSelectedIdx - 1, 0);
      const items = autocompleteContainer.querySelectorAll('.autocomplete-item');
      updateAutocompleteSelection(items);
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      const items = autocompleteContainer.querySelectorAll('.autocomplete-item');
      if (autocompleteSelectedIdx >= 0 && autocompleteSelectedIdx < items.length) {
        selectAutocomplete(autocompleteSelectedIdx);
      }
      return;
    }
    if (e.key === 'Escape') {
      closeAutocomplete();
      return;
    }
  }
  // Ctrl+Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ==================== FILES ====================
function renderFiles() {
  const render = (container) => {
    container.innerHTML = '';
    files.forEach((f, idx) => {
      const div = document.createElement('div');
      div.className = `file-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm transition-colors ${idx === activeFileIdx ? 'active' : 'text-gray-400'}`;
      div.innerHTML = `<i data-lucide="file-code" class="w-4 h-4 flex-shrink-0"></i><span class="truncate flex-1">${escapeHtml(f.name)}</span>${files.length > 1 ? `<button class="file-delete p-0.5 rounded hover:bg-red-500/20 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all" data-idx="${idx}" title="Delete"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}`;
      div.addEventListener('click', (e) => {
        if (e.target.closest('.file-delete')) {
          deleteFile(idx);
          return;
        }
        switchFile(idx);
        // Close mobile sidebar
        $('sidebarMobile').classList.add('hidden');
        $('sidebarOverlay').classList.add('hidden');
      });
      // Show delete on hover
      div.addEventListener('mouseenter', () => { const d = div.querySelector('.file-delete'); if(d) d.style.opacity='1'; });
      div.addEventListener('mouseleave', () => { const d = div.querySelector('.file-delete'); if(d) d.style.opacity='0'; });
      container.appendChild(div);
    });
    lucide.createIcons({ nameAttr: 'data-lucide' });
  };
  render(fileList);
  render(fileListMobile);
  renderTabs();
}

function renderTabs() {
  tabBar.innerHTML = '';
  files.forEach((f, idx) => {
    const tab = document.createElement('button');
    tab.className = `flex items-center gap-1.5 px-3 py-2 text-xs font-medium whitespace-nowrap transition-all group ${idx === activeFileIdx ? 'tab-active' : 'tab-inactive'}`;
    tab.innerHTML = `<i data-lucide="file-code" class="w-3 h-3"></i><span>${escapeHtml(f.name)}</span>${files.length > 1 ? `<button class="tab-delete p-0 rounded hover:bg-red-500/20 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all ml-1" data-idx="${idx}" title="Delete"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}`;
    tab.addEventListener('click', (e) => {
      if (e.target.closest('.tab-delete')) {
        e.preventDefault();
        e.stopPropagation();
        deleteFile(idx);
        return;
      }
      switchFile(idx);
    });
    tabBar.appendChild(tab);
  });
  lucide.createIcons({ nameAttr: 'data-lucide' });
}

function switchFile(idx) {
  activeFileIdx = idx;
  codeInput.value = files[idx].content;
  updateEditor();
  renderFiles();
}

function addFile() {
  let name = `file${files.length}.c`;
  // Check for dups
  let counter = files.length;
  while (files.some(f => f.name === name)) {
    counter++;
    name = `file${counter}.c`;
  }
  files.push({ name, content: `#include <stdio.h>\n\nint main() {\n    // ${name}\n    return 0;\n}\n` });
  switchFile(files.length - 1);
  saveToStorage();
}

function deleteFile(idx) {
  if (files.length <= 1) return;
  files.splice(idx, 1);
  if (activeFileIdx >= files.length) activeFileIdx = files.length - 1;
  switchFile(activeFileIdx);
  saveToStorage();
}

// ==================== COMPILER (Offline + Online Fallback) ====================
function getWordBeforeCursor() {
  const text = codeInput.value;
  const pos = codeInput.selectionStart;
  let start = pos - 1;
  while (start >= 0 && /[a-zA-Z0-9_]/.test(text[start])) {
    start--;
  }
  return text.substring(start + 1, pos);
}

function showAutocomplete() {
  const word = getWordBeforeCursor();
  
  if (word.length === 0) {
    closeAutocomplete();
    return;
  }

  const lowerWord = word.toLowerCase();
  const filtered = AUTOCOMPLETE_SUGGESTIONS.filter(s => 
    s.label.toLowerCase().startsWith(lowerWord) && s.label.length > word.length
  );

  if (filtered.length === 0) {
    closeAutocomplete();
    return;
  }

  if (!autocompleteContainer) {
    autocompleteContainer = document.createElement('div');
    autocompleteContainer.className = 'autocomplete-container';
    document.body.appendChild(autocompleteContainer);
  }

  autocompleteContainer.innerHTML = '';
  filtered.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    
    let badgeColor = '#00d4ff';
    if (item.type === 'header') badgeColor = '#b48eff';
    else if (item.type === 'keyword') badgeColor = '#c8ff00';
    
    div.innerHTML = `
      <span style="color: #50fa7b; font-weight: 600;">${escapeHtml(item.label)}</span>
      <span class="type-badge" style="background: ${badgeColor}20; color: ${badgeColor};">${item.type}</span>
      <span class="desc">${item.desc}</span>
    `;
    div.addEventListener('click', () => selectAutocomplete(idx, filtered));
    div.addEventListener('mouseenter', () => {
      document.querySelectorAll('.autocomplete-item').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      autocompleteSelectedIdx = idx;
    });
    autocompleteContainer.appendChild(div);
  });

  // Position autocomplete near cursor
  const rect = codeInput.getBoundingClientRect();
  const textBeforeCursor = codeInput.value.substring(0, codeInput.selectionStart);
  const lines = textBeforeCursor.split('\n');
  const currentLine = lines[lines.length - 1];
  const lineNumber = lines.length - 1;
  
  const lineHeight = 1.65 * settings.fontSize;
  const top = rect.top + lineHeight * (lineNumber + 1);
  const left = rect.left + (currentLine.length * (settings.fontSize * 0.6));
  
  autocompleteContainer.style.top = top + 'px';
  autocompleteContainer.style.left = left + 'px';
  autocompleteContainer.style.display = 'block';
  
  // Auto-select first result
  autocompleteSelectedIdx = 0;
  const items = autocompleteContainer.querySelectorAll('.autocomplete-item');
  if (items.length > 0) {
    items[0].classList.add('selected');
  }
  
  lastAutocompleteQuery = word;
}

function updateAutocompleteSelection(items) {
  items.forEach(item => item.classList.remove('selected'));
  if (autocompleteSelectedIdx >= 0 && autocompleteSelectedIdx < items.length) {
    items[autocompleteSelectedIdx].classList.add('selected');
    items[autocompleteSelectedIdx].scrollIntoView({ block: 'nearest' });
  }
}

function selectAutocomplete(idx, filtered) {
  if (!filtered) {
    const word = getWordBeforeCursor();
    filtered = AUTOCOMPLETE_SUGGESTIONS.filter(s => 
      s.label.startsWith(word) && s.label.length > word.length
    );
  }
  
  if (idx < 0 || idx >= filtered.length) return;
  
  const item = filtered[idx];
  const word = getWordBeforeCursor();
  const start = codeInput.selectionStart - word.length;
  const end = codeInput.selectionStart;
  
  codeInput.value = codeInput.value.substring(0, start) + item.snippet + codeInput.value.substring(end);
  
  // Position cursor inside the snippet for editing
  const cursorPos = start + item.snippet.indexOf('(') + 1;
  codeInput.selectionStart = codeInput.selectionEnd = Math.min(cursorPos, start + item.snippet.length);
  
  codeInput.dispatchEvent(new Event('input'));
  closeAutocomplete();
}

function closeAutocomplete() {
  if (autocompleteContainer) {
    autocompleteContainer.style.display = 'none';
  }
  autocompleteSelectedIdx = -1;
}

async function runCode() {
  if (isCompiling) return;
  isCompiling = true;

  const btn = $('btnRun');
  btn.innerHTML = `<span class="compile-spinner"></span><span>Compiling...</span>`;
  btn.style.opacity = '0.7';
  btn.disabled = true;

  // Clear output and show loading state
  outputContent.innerHTML = '';
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'text-gray-500 flex items-center gap-2';
  loadingDiv.innerHTML = `<span class="compile-spinner"></span> Compiling and running...`;
  outputContent.appendChild(loadingDiv);
  outputStatus.textContent = '';

  const code = files[activeFileIdx].content;
  const startTime = performance.now();

  try {
    // Try online first
    const onlineResult = await tryOnlineCompile(code);
    if (onlineResult.success) {
      displayCompileResult(onlineResult, startTime);
    } else {
      // Fallback to offline simulation
      const offlineResult = await tryOfflineCompile(code);
      displayCompileResult(offlineResult, startTime);
    }
  } catch (err) {
    // Emergency fallback
    outputContent.innerHTML = '';
    const errorHeader = document.createElement('div');
    errorHeader.className = 'output-line';
    errorHeader.style.color = '#f87171';
    errorHeader.innerHTML = `<span class="font-semibold">⚠ Compilation Error:</span>`;
    outputContent.appendChild(errorHeader);

    const errorMsg = document.createElement('div');
    errorMsg.className = 'output-line';
    errorMsg.style.color = '#ff9999';
    errorMsg.style.paddingLeft = '12px';
    errorMsg.textContent = err.message || 'Unknown error occurred';
    outputContent.appendChild(errorMsg);

    outputStatus.textContent = '● Error';
    outputStatus.style.color = '#f87171';
  }

  // Auto-scroll to bottom
  setTimeout(() => {
    outputContent.scrollTop = outputContent.scrollHeight;
  }, 50);

  // Re-enable button
  isCompiling = false;
  btn.innerHTML = `<i data-lucide="play" class="w-3.5 h-3.5"></i><span id="runBtnText">${currentConfig.run_button_text || 'Run Code'}</span>`;
  btn.style.opacity = '1';
  btn.disabled = false;
  lucide.createIcons({ nameAttr: 'data-lucide' });
}

async function tryOnlineCompile(code) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    
    const resp = await fetch('https://emkc.org/api/v2/piston/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        language: 'c',
        version: '10.2.0',
        files: [{ name: files[activeFileIdx].name, content: code }],
        stdin: ''
      })
    });

    clearTimeout(timeout);

    if (!resp.ok) {
      return { success: false, error: `HTTP ${resp.status}` };
    }

    const data = await resp.json();
    return { success: true, data: data };
  } catch (err) {
    return { success: false, error: err.message };
  }
}

function tryOfflineCompile(code) {
  // Simulate compilation with basic syntax checking
  return new Promise((resolve) => {
    setTimeout(() => {
      const errors = checkSyntax(code);
      if (errors.length > 0) {
        resolve({
          success: true,
          data: {
            compile: { stderr: errors.join('\n') },
            run: null
          }
        });
      } else {
        // Simulate execution
        const output = simulateExecution(code);
        resolve({
          success: true,
          data: {
            compile: { stderr: '' },
            run: { stdout: output, stderr: '', code: 0 }
          }
        });
      }
    }, 500);
  });
}

function checkSyntax(code) {
  const errors = [];
  const lines = code.split('\n');

  let braceStack = [];
  let bracketStack = [];
  let parenStack = [];
  let inString = false;
  let inComment = false;
  let multiLineComment = false;

  lines.forEach((line, lineNum) => {
    const lineNo = lineNum + 1;
    let cleanLine = line;

    // Skip full-line comments
    if (cleanLine.trim().startsWith('//')) return;

    // Handle multiline comments
    if (multiLineComment) {
      if (cleanLine.includes('*/')) {
        multiLineComment = false;
        cleanLine = cleanLine.split('*/')[1] || '';
      } else {
        return;
      }
    }
    if (cleanLine.includes('/*')) {
      if (!cleanLine.includes('*/')) {
        multiLineComment = true;
        return;
      }
      cleanLine = cleanLine.replace(/\/\*.*?\*\//g, '');
    }

    // Basic string detection (simplified)
    let i = 0;
    while (i < cleanLine.length) {
      const ch = cleanLine[i];

      // String literals
      if (ch === '"' && (i === 0 || cleanLine[i-1] !== '\\')) {
        inString = !inString;
        i++;
        continue;
      }

      if (inString) { i++; continue; }

      // Track brackets
      if (ch === '{') braceStack.push({ ch: '{', line: lineNo });
      else if (ch === '}') {
        if (braceStack.length === 0) errors.push(`error at line ${lineNo}: unexpected closing brace '}'`);
        else braceStack.pop();
      }
      else if (ch === '[') bracketStack.push({ ch: '[', line: lineNo });
      else if (ch === ']') {
        if (bracketStack.length === 0) errors.push(`error at line ${lineNo}: unexpected closing bracket ']'`);
        else bracketStack.pop();
      }
      else if (ch === '(') parenStack.push({ ch: '(', line: lineNo });
      else if (ch === ')') {
        if (parenStack.length === 0) errors.push(`error at line ${lineNo}: unexpected closing parenthesis ')'`);
        else parenStack.pop();
      }

      i++;
    }

    // Check for missing semicolons on statements (excluding control flow)
    const trimmed = cleanLine.trim();
    if (trimmed.length > 0) {
      const hasControlFlow = /^\s*(if|else|for|while|do|switch|case|default|struct|union|enum|typedef|return|break|continue|goto)\b/.test(cleanLine);
      const isFunctionDef = /^\s*\w+[\s\*&]+\w+\s*\(/.test(cleanLine) && !cleanLine.includes(';');
      const isOpenBrace = trimmed.endsWith('{');
      const isCloseBrace = trimmed === '}' || trimmed === '};' || trimmed === '} while' || trimmed.endsWith('} else');
      const isPreprocessor = trimmed.startsWith('#');
      const isLabel = /^\w+\s*:/.test(trimmed);
      const isEmpty = trimmed === '';

      // Detect missing semicolon
      if (!isEmpty && !hasControlFlow && !isFunctionDef && !isOpenBrace && !isCloseBrace && !isPreprocessor && !isLabel) {
        if (!trimmed.endsWith(';') && !trimmed.endsWith('{') && !trimmed.endsWith('\\')) {
          // Check if it's a declaration or assignment
          if (/^[\w\s\*&]+[=()]/.test(trimmed) || /int|char|float|double|void|bool|long|short|unsigned|signed|const|static|extern/.test(trimmed)) {
            errors.push(`error at line ${lineNo}: missing ';' at end of statement`);
          }
        }
      }
    }
  });

  // Check unmatched opening brackets
  if (braceStack.length > 0) {
    braceStack.forEach(b => {
      errors.push(`error at line ${b.line}: missing closing brace '}'`);
    });
  }
  if (bracketStack.length > 0) {
    bracketStack.forEach(b => {
      errors.push(`error at line ${b.line}: missing closing bracket ']'`);
    });
  }
  if (parenStack.length > 0) {
    parenStack.forEach(b => {
      errors.push(`error at line ${b.line}: missing closing parenthesis ')'`);
    });
  }

  // Check for main function
  if (!code.includes('int main') && !code.includes('void main')) {
    errors.push(`warning: no main function found`);
  }

  return errors;
}

function simulateExecution(code) {
  // Extract printf statements and simulate output
  const printfRegex = /printf\s*\(\s*"([^"]*)"/g;
  const outputs = [];
  let match;

  while ((match = printfRegex.exec(code)) !== null) {
    let text = match[1];
    // Replace common escape sequences
    text = text.replace(/\\n/g, '\n');
    text = text.replace(/\\t/g, '\t');
    text = text.replace(/\\r/g, '\r');
    text = text.replace(/%d/g, '[number]');
    text = text.replace(/%s/g, '[string]');
    text = text.replace(/%f/g, '[float]');
    text = text.replace(/%c/g, '[char]');
    outputs.push(text);
  }

  // If no printf found, show a default message
  if (outputs.length === 0) {
    return 'Program executed (no output detected - add printf() to see results)';
  }

  return outputs.join('\n');
}

function displayCompileResult(result, startTime) {
  outputContent.innerHTML = '';
  const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

  let hasError = false;
  let hasOutput = false;
  let errorCount = 0;
  let warningCount = 0;

  // Display compilation errors (PRIORITY)
  if (result.data.compile && result.data.compile.stderr && result.data.compile.stderr.trim()) {
    hasError = true;
    const stderrText = result.data.compile.stderr.trim();
    
    // Count errors and warnings
    const errorMatches = stderrText.match(/error:/gi) || [];
    const warningMatches = stderrText.match(/warning:/gi) || [];
    errorCount = errorMatches.length;
    warningCount = warningMatches.length;

    const errorHeader = document.createElement('div');
    errorHeader.className = 'output-line';
    errorHeader.style.color = '#f87171';
    errorHeader.style.fontWeight = 'bold';
    errorHeader.style.marginBottom = '6px';
    
    if (errorCount > 0) {
      errorHeader.innerHTML = `<span>🛑 ${errorCount} Compilation Error${errorCount > 1 ? 's' : ''}${warningCount > 0 ? ` + ${warningCount} Warning${warningCount > 1 ? 's' : ''}` : ''}</span>`;
    } else if (warningCount > 0) {
      errorHeader.innerHTML = `<span>⚠️ ${warningCount} Warning${warningCount > 1 ? 's' : ''}</span>`;
      errorHeader.style.color = '#ffcc00';
    }
    outputContent.appendChild(errorHeader);

    // Display each error/warning line
    const errorLines = stderrText.split('\n');
    errorLines.forEach(line => {
      if (line.trim()) {
        const errorLine = document.createElement('div');
        errorLine.className = 'output-line';
        
        if (line.toLowerCase().includes('error:')) {
          errorLine.style.color = '#ff6b6b';
          errorLine.style.paddingLeft = '12px';
          errorLine.style.borderLeft = '3px solid #ff6b6b';
          errorLine.style.paddingLeft = '10px';
        } else if (line.toLowerCase().includes('warning:')) {
          errorLine.style.color = '#ffa94d';
          errorLine.style.paddingLeft = '12px';
          errorLine.style.borderLeft = '3px solid #ffa94d';
          errorLine.style.paddingLeft = '10px';
        } else {
          errorLine.style.color = '#ff9999';
          errorLine.style.paddingLeft = '12px';
        }
        
        errorLine.textContent = line;
        outputContent.appendChild(errorLine);
      }
    });

    // Add separator
    if (result.data.run) {
      const separator = document.createElement('div');
      separator.style.height = '1px';
      separator.style.background = 'rgba(255,255,255,0.1)';
      separator.style.margin = '12px 0';
      outputContent.appendChild(separator);
    }
  }

  // Display runtime output (only if compilation succeeded)
  if (result.data.run && !hasError) {
    if (result.data.run.stdout && result.data.run.stdout.trim()) {
      hasOutput = true;
      const outputHeader = document.createElement('div');
      outputHeader.className = 'output-line';
      outputHeader.style.color = '#50fa7b';
      outputHeader.style.fontWeight = 'bold';
      outputHeader.style.marginBottom = '6px';
      outputHeader.innerHTML = `<span>✅ Output:</span>`;
      outputContent.appendChild(outputHeader);

      const stdoutLines = result.data.run.stdout.split('\n');
      stdoutLines.forEach(line => {
        const outputLine = document.createElement('div');
        outputLine.className = 'output-line';
        outputLine.style.color = '#50fa7b';
        outputLine.style.paddingLeft = '12px';
        outputLine.textContent = line;
        outputContent.appendChild(outputLine);
      });
    }

    if (result.data.run.stderr && result.data.run.stderr.trim()) {
      const stderrLines = result.data.run.stderr.trim().split('\n');
      stderrLines.forEach(line => {
        if (line.trim()) {
          const warningLine = document.createElement('div');
          warningLine.className = 'output-line';
          warningLine.style.color = '#ffcc00';
          warningLine.style.paddingLeft = '12px';
          warningLine.textContent = line;
          outputContent.appendChild(warningLine);
        }
      });
    }

    if (result.data.run.code !== 0 && result.data.run.code !== undefined) {
      const exitLine = document.createElement('div');
      exitLine.className = 'output-line';
      exitLine.style.color = '#ff9999';
      exitLine.style.marginTop = '8px';
      exitLine.textContent = `⚠️ Process exited with code ${result.data.run.code}`;
      outputContent.appendChild(exitLine);
      hasError = true;
    }
  }

  // Show "No output" message
  if (!hasOutput && !hasError) {
    const noOutputDiv = document.createElement('div');
    noOutputDiv.className = 'output-line';
    noOutputDiv.style.color = '#888888';
    noOutputDiv.innerHTML = `<i data-lucide="info" class="w-3 h-3 inline mr-1"></i> Program ran successfully with no output`;
    outputContent.appendChild(noOutputDiv);
  }

  // Show execution time
  const timeDiv = document.createElement('div');
  timeDiv.className = 'output-line';
  timeDiv.style.color = '#666666';
  timeDiv.style.fontSize = '10px';
  timeDiv.style.marginTop = '12px';
  timeDiv.style.borderTop = '1px solid rgba(255,255,255,0.1)';
  timeDiv.style.paddingTop = '8px';
  timeDiv.textContent = `⏱️ Executed in ${elapsed}s`;
  outputContent.appendChild(timeDiv);

  // Update status
  outputStatus.textContent = hasError ? `● ${errorCount > 0 ? 'Error' : 'Warning'}` : '● Success';
  outputStatus.style.color = hasError ? (errorCount > 0 ? '#f87171' : '#ffcc00') : '#50fa7b';

  lucide.createIcons({ nameAttr: 'data-lucide' });
}

// ==================== FORMAT ====================
function formatCode() {
  let code = codeInput.value;
  // Basic formatting: normalize indentation
  const lines = code.split('\n');
  let indent = 0;
  const formatted = lines.map(line => {
    let trimmed = line.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('}') || trimmed.startsWith(')')) indent = Math.max(0, indent - 1);
    const result = '    '.repeat(indent) + trimmed;
    if (trimmed.endsWith('{')) indent++;
    return result;
  }).join('\n');
  codeInput.value = formatted;
  files[activeFileIdx].content = formatted;
  updateEditor();
  if (settings.autoSave) saveToStorage();
}

// ==================== DOWNLOAD ====================
function downloadFile() {
  const blob = new Blob([codeInput.value], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = files[activeFileIdx].name || 'code.c';
  link.style.display = 'none';
  document.documentElement.appendChild(link);
  link.click();
  setTimeout(() => {
    document.documentElement.removeChild(link);
    URL.revokeObjectURL(url);
  }, 100);
}

function applySettings() {
  const fs = settings.fontSize + 'px';
  const ff = `'${settings.fontFamily}', monospace`;
  codeInput.style.fontSize = fs;
  codeInput.style.fontFamily = ff;
  highlightOverlay.style.fontSize = fs;
  highlightOverlay.style.fontFamily = ff;
  lineNumbers.style.fontSize = fs;
  lineNumbers.style.fontFamily = ff;

  const app = $('app');
  const body = $('appBody');
  if (settings.theme === 'light') {
    app.classList.add('theme-light');
    body.classList.add('theme-light');
    app.style.background = '#fafafa';
    $('headerBar').style.background = 'rgba(250,250,250,0.98)';
    $('outputPanel').style.background = '#f0f0f5';
  } else {
    app.classList.remove('theme-light');
    body.classList.remove('theme-light');
    app.style.background = '#0d0d14';
    $('headerBar').style.background = 'rgba(13,13,20,0.98)';
    $('outputPanel').style.background = '#0a0a10';
  }

  if (settings.wordWrap) {
    codeInput.style.whiteSpace = 'pre-wrap';
    codeInput.style.wordBreak = 'break-all';
    highlightOverlay.style.whiteSpace = 'pre-wrap';
    highlightOverlay.style.wordBreak = 'break-all';
  } else {
    codeInput.style.whiteSpace = 'pre';
    codeInput.style.wordBreak = 'normal';
    highlightOverlay.style.whiteSpace = 'pre';
    highlightOverlay.style.wordBreak = 'normal';
  }

  updateEditor();
}

// ==================== RESIZE HANDLE ====================
let isResizing = false;
const resizeHandle = $('resizeHandle');
const outputPanel = $('outputPanel');
const editorWrapper = $('editorWrapper');

resizeHandle.addEventListener('mousedown', (e) => { isResizing = true; e.preventDefault(); });
resizeHandle.addEventListener('touchstart', (e) => { isResizing = true; }, { passive: true });

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const mainArea = editorWrapper.parentElement;
  const rect = mainArea.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const totalH = rect.height;
  const outputH = Math.max(80, Math.min(totalH - 100, totalH - y));
  outputPanel.style.height = outputH + 'px';
});

document.addEventListener('touchmove', (e) => {
  if (!isResizing) return;
  const touch = e.touches[0];
  const mainArea = editorWrapper.parentElement;
  const rect = mainArea.getBoundingClientRect();
  const y = touch.clientY - rect.top;
  const totalH = rect.height;
  const outputH = Math.max(80, Math.min(totalH - 100, totalH - y));
  outputPanel.style.height = outputH + 'px';
});

document.addEventListener('mouseup', () => { isResizing = false; });
document.addEventListener('touchend', () => { isResizing = false; });

// ==================== LOCAL STORAGE ====================
function saveToStorage() {
  try {
    localStorage.setItem('craby_c_files', JSON.stringify(files));
    localStorage.setItem('craby_c_active', activeFileIdx);
    localStorage.setItem('craby_c_settings', JSON.stringify(settings));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const f = localStorage.getItem('craby_c_files');
    const a = localStorage.getItem('craby_c_active');
    const s = localStorage.getItem('craby_c_settings');
    if (f) files = JSON.parse(f);
    if (a) activeFileIdx = Math.min(parseInt(a), files.length - 1);
    if (s) settings = { ...settings, ...JSON.parse(s) };
  } catch(e) {}
}
