  <script>
// ─── STATE ──────────────────────────────────────────────
const DEFAULT_CODE = `#include <stdio.h>

int main() {
    printf("Hello, World!\\n");
    
    int a = 10, b = 20;
    printf("Sum of %d and %d is %d\\n", a, b, a + b);
    
    for (int i = 1; i <= 5; i++) {
        printf("Iteration %d\\n", i);
    }
    
    return 0;
}`;

let files = { 'main.c': DEFAULT_CODE };
let activeFile = 'main.c';
let settings = {
  fontSize: 14,
  fontFamily: "'JetBrains Mono', monospace",
  theme: 'dark',
  lineNumbers: true,
  wordWrap: false,
  autoSave: true
};
let deleteTarget = null;

// Load from localStorage
try {
  const saved = localStorage.getItem('cforge_files');
  if (saved) files = JSON.parse(saved);
  const savedSettings = localStorage.getItem('cforge_settings');
  if (savedSettings) settings = { ...settings, ...JSON.parse(savedSettings) };
  const savedActive = localStorage.getItem('cforge_active');
  if (savedActive && files[savedActive]) activeFile = savedActive;
} catch(e) {}

// ─── DOM REFS ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const codeInput = $('code-input');
const editorDisplay = $('editor-display');
const editorScroll = $('editor-scroll');
const outputContent = $('output-content');
const compileStatus = $('compile-status');
const tabBar = $('tab-bar');
const fileList = $('file-list');
const sidebarFiles = $('sidebar-files');
const sidebarSettings = $('sidebar-settings');
const sidebarOverlay = $('sidebar-overlay');

// ─── SYNTAX HIGHLIGHTING ────────────────────────────────
const C_KEYWORDS = ['auto','break','case','char','const','continue','default','do','double','else','enum','extern','float','for','goto','if','inline','int','long','register','restrict','return','short','signed','sizeof','static','struct','switch','typedef','union','unsigned','void','volatile','while','_Bool','_Complex','_Imaginary','NULL','true','false','TRUE','FALSE'];
const C_TYPES = ['int','char','float','double','long','short','void','unsigned','signed','size_t','FILE','bool'];
const C_STDLIB = ['printf','scanf','fprintf','sprintf','snprintf','malloc','calloc','realloc','free','strlen','strcpy','strncpy','strcat','strcmp','memcpy','memset','fopen','fclose','fread','fwrite','fgets','fputs','puts','gets','getchar','putchar','atoi','atof','atol','exit','abs','rand','srand','sizeof','main'];

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightLine(line) {
  // Preprocessor directives
  if (/^\s*#/.test(line)) {
    return `<span class="syn-pre">${escHtml(line)}</span>`;
  }

  let result = '';
  let i = 0;
  while (i < line.length) {
    // Single-line comment
    if (line[i] === '/' && line[i+1] === '/') {
      result += `<span class="syn-cmt">${escHtml(line.slice(i))}</span>`;
      break;
    }
    // Multi-line comment start (simplified)
    if (line[i] === '/' && line[i+1] === '*') {
      const end = line.indexOf('*/', i+2);
      if (end !== -1) {
        result += `<span class="syn-cmt">${escHtml(line.slice(i, end+2))}</span>`;
        i = end + 2;
        continue;
      } else {
        result += `<span class="syn-cmt">${escHtml(line.slice(i))}</span>`;
        break;
      }
    }
    // Strings
    if (line[i] === '"') {
      let j = i + 1;
      while (j < line.length && !(line[j] === '"' && line[j-1] !== '\\')) j++;
      result += `<span class="syn-str">${escHtml(line.slice(i, j+1))}</span>`;
      i = j + 1;
      continue;
    }
    // Char literals
    if (line[i] === "'") {
      let j = i + 1;
      while (j < line.length && !(line[j] === "'" && line[j-1] !== '\\')) j++;
      result += `<span class="syn-str">${escHtml(line.slice(i, j+1))}</span>`;
      i = j + 1;
      continue;
    }
    // Numbers
    if (/[0-9]/.test(line[i]) && (i === 0 || /[^a-zA-Z_]/.test(line[i-1]))) {
      let j = i;
      while (j < line.length && /[0-9.xXa-fA-F]/.test(line[j])) j++;
      result += `<span class="syn-num">${escHtml(line.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // Words
    if (/[a-zA-Z_]/.test(line[i])) {
      let j = i;
      while (j < line.length && /[a-zA-Z0-9_]/.test(line[j])) j++;
      const word = line.slice(i, j);
      // Check if followed by (
      const isCall = line[j] === '(';
      if (C_KEYWORDS.includes(word) && !C_TYPES.includes(word)) {
        result += `<span class="syn-kw">${escHtml(word)}</span>`;
      } else if (C_TYPES.includes(word)) {
        result += `<span class="syn-type">${escHtml(word)}</span>`;
      } else if (C_STDLIB.includes(word) || isCall) {
        result += `<span class="syn-fn">${escHtml(word)}</span>`;
      } else {
        result += `<span class="syn-def">${escHtml(word)}</span>`;
      }
      i = j;
      continue;
    }
    // Operators / punctuation
    if ('{}[]();,=+-*/<>!&|^%~?:.'.includes(line[i])) {
      result += `<span class="syn-op">${escHtml(line[i])}</span>`;
      i++;
      continue;
    }
    result += escHtml(line[i]);
    i++;
  }
  return result;
}

// ─── EDITOR RENDERING ───────────────────────────────────
let cursorLine = 0;

function renderEditor() {
  const code = files[activeFile] || '';
  const lines = code.split('\n');
  const showLn = settings.lineNumbers;

  let html = '';
  for (let i = 0; i < lines.length; i++) {
    const isCursor = i === cursorLine;
    html += `<div class="flex ${isCursor ? 'cursor-line' : ''}" style="min-height:1.65em;">`;
    if (showLn) {
      html += `<div class="line-number ${isCursor ? 'active-ln' : ''}" style="font-size:inherit;">${i+1}</div>`;
    }
    html += `<div class="code-line flex-1" style="${settings.wordWrap ? 'white-space:pre-wrap;word-break:break-all;' : ''}">${highlightLine(lines[i]) || ' '}</div>`;
    html += `</div>`;
  }
  editorDisplay.innerHTML = html;
}

function syncScroll() {
  codeInput.scrollTop = editorScroll.scrollTop;
  codeInput.scrollLeft = editorScroll.scrollLeft;
}

editorScroll.addEventListener('scroll', () => {
  codeInput.style.top = -editorScroll.scrollTop + 'px';
  codeInput.style.left = -editorScroll.scrollLeft + 'px';
});

codeInput.addEventListener('input', () => {
  files[activeFile] = codeInput.value;
  updateCursorLine();
  renderEditor();
  autoSave();
  showAutocomplete();
});

codeInput.addEventListener('click', () => { updateCursorLine(); renderEditor(); hideAutocomplete(); });
codeInput.addEventListener('keyup', (e) => {
  updateCursorLine();
  renderEditor();
  updateCursorPos();
  if (e.key !== 'Enter' && e.key !== 'Escape' && !['ArrowUp','ArrowDown'].includes(e.key)) {
    showAutocomplete();
  }
});

codeInput.addEventListener('keydown', (e) => {
  // Tab support
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = codeInput.selectionStart;
    const end = codeInput.selectionEnd;
    codeInput.value = codeInput.value.substring(0, start) + '    ' + codeInput.value.substring(end);
    codeInput.selectionStart = codeInput.selectionEnd = start + 4;
    files[activeFile] = codeInput.value;
    renderEditor();
    autoSave();
    showAutocomplete();
    return;
  }
  // Arrow keys for autocomplete navigation
  const autocompletePopup = $('autocomplete-popup');
  if (!autocompletePopup.classList.contains('hidden')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      navigateAutocomplete(1);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      navigateAutocomplete(-1);
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      selectAutocomplete();
      return;
    }
  }
  // Escape to hide autocomplete
  if (e.key === 'Escape') {
    hideAutocomplete();
  }
  // Ctrl+Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
  // Ctrl+S to save
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveFiles();
    showToast('Saved!', '#caff33');
  }
});

function updateCursorLine() {
  const val = codeInput.value.substring(0, codeInput.selectionStart);
  cursorLine = val.split('\n').length - 1;
}

function updateCursorPos() {
  const val = codeInput.value.substring(0, codeInput.selectionStart);
  const lines = val.split('\n');
  const ln = lines.length;
  const col = lines[lines.length - 1].length + 1;
  $('cursor-pos').textContent = `Ln ${ln}, Col ${col}`;
}

function getWordAtCursor() {
  const val = codeInput.value;
  const pos = codeInput.selectionStart;
  let start = pos;
  while (start > 0 && /[a-zA-Z0-9_]/.test(val[start - 1])) start--;
  return val.substring(start, pos);
}

function showAutocomplete() {
  const word = getWordAtCursor();
  if (word.length < 1) {
    hideAutocomplete();
    return;
  }

  const matches = Object.entries(AUTOCOMPLETE_DB)
    .filter(([key]) => key.toLowerCase().startsWith(word.toLowerCase()))
    .slice(0, 12)
    .map(([key, data]) => data);

  if (matches.length === 0) {
    hideAutocomplete();
    return;
  }

  const popup = $('autocomplete-popup');
  const list = $('autocomplete-list');
  list.innerHTML = matches.map((item, i) => `
    <div class="autocomplete-item px-3 py-2 text-xs cursor-pointer hover:bg-white/10 ${i === 0 ? 'active' : ''}" data-template="${item.template}" style="color:#c3e88d; display:flex; justify-content:space-between; gap:10px;">
      <span>${item.label}</span>
      <span style="color:rgba(255,255,255,0.3); font-size:10px;">${item.template}</span>
    </div>
  `).join('');

  autocompleteIndex = 0;

  popup.style.left = (codeInput.offsetLeft + 64 + (codeInput.selectionStart * 8.4 - editorScroll.scrollLeft)) + 'px';
  popup.style.top = (codeInput.offsetTop + 40 + (cursorLine * 26.4 - editorScroll.scrollTop)) + 'px';
  popup.classList.remove('hidden');

  list.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('click', () => selectAutocompleteByElement(el));
  });
}

function hideAutocomplete() {
  $('autocomplete-popup').classList.add('hidden');
  autocompleteIndex = -1;
}

function navigateAutocomplete(dir) {
  const items = $('autocomplete-list').querySelectorAll('.autocomplete-item');
  if (items.length === 0) return;

  if (autocompleteIndex >= 0) {
    items[autocompleteIndex].classList.remove('active');
  }

  autocompleteIndex += dir;
  if (autocompleteIndex < 0) autocompleteIndex = items.length - 1;
  if (autocompleteIndex >= items.length) autocompleteIndex = 0;

  items[autocompleteIndex].classList.add('active');
  items[autocompleteIndex].scrollIntoView({ block: 'nearest' });
}

function selectAutocomplete() {
  const items = $('autocomplete-list').querySelectorAll('.autocomplete-item');
  if (autocompleteIndex >= 0 && autocompleteIndex < items.length) {
    selectAutocompleteByElement(items[autocompleteIndex]);
  }
}

function selectAutocompleteByElement(el) {
  const template = el.dataset.template;
  const word = getWordAtCursor();
  const val = codeInput.value;
  const pos = codeInput.selectionStart;
  const start = pos - word.length;

  codeInput.value = val.substring(0, start) + template + val.substring(pos);
  
  // Position cursor inside parentheses for functions with parameters
  const cursorPos = template.indexOf('(') + 1;
  if (cursorPos > 0 && template.includes(')')) {
    codeInput.selectionStart = codeInput.selectionEnd = start + cursorPos;
  } else {
    codeInput.selectionStart = codeInput.selectionEnd = start + template.length;
  }
  
  files[activeFile] = codeInput.value;
  renderEditor();
  hideAutocomplete();
  autoSave();
  updateCursorPos();
}
function renderFileList() {
  const names = Object.keys(files);
  fileList.innerHTML = names.map(name => `
    <div class="file-item flex items-center gap-2 px-4 py-2 cursor-pointer ${name === activeFile ? 'active' : ''}" data-file="${name}">
      <i data-lucide="file-code" style="width:14px;height:14px;color:${name === activeFile ? '#caff33' : 'rgba(255,255,255,0.3)'};flex-shrink:0;"></i>
      <span class="flex-1 text-xs font-mono truncate" style="color:${name === activeFile ? '#caff33' : '#e2e8f0'};">${name}</span>
      ${names.length > 1 ? `<button class="file-delete p-0.5 rounded hover:bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity" data-del="${name}" aria-label="Delete ${name}" style="opacity:0.3;"><i data-lucide="x" style="width:12px;height:12px;"></i></button>` : ''}
    </div>
  `).join('');
  lucide.createIcons();

  fileList.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.file-delete')) return;
      switchFile(el.dataset.file);
    });
  });
  fileList.querySelectorAll('.file-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTarget = btn.dataset.del;
      $('delete-msg').textContent = `Are you sure you want to delete "${deleteTarget}"?`;
      $('delete-prompt').style.display = 'flex';
    });
  });
}

function renderTabs() {
  const names = Object.keys(files);
  tabBar.innerHTML = names.map(name => `
    <div class="tab-item flex items-center gap-1.5 px-3 py-1.5 cursor-pointer ${name === activeFile ? 'active' : ''}" data-tab="${name}">
      <i data-lucide="file-code" style="width:11px;height:11px;color:${name === activeFile ? '#caff33' : 'rgba(255,255,255,0.25)'};"></i>
      <span class="text-xs font-mono" style="color:${name === activeFile ? '#e2e8f0' : 'rgba(255,255,255,0.4)'};">${name}</span>
    </div>
  `).join('');
  lucide.createIcons();

  tabBar.querySelectorAll('.tab-item').forEach(el => {
    el.addEventListener('click', () => switchFile(el.dataset.tab));
  });
}

function switchFile(name) {
  if (!files[name]) return;
  activeFile = name;
  codeInput.value = files[name];
  cursorLine = 0;
  renderEditor();
  renderFileList();
  renderTabs();
  $('active-file-status').textContent = name;
  localStorage.setItem('cforge_active', name);

}

function createNewFile() {
  let name = $('newfile-input').value.trim();
  if (!name) return;
  if (!name.endsWith('.c') && !name.endsWith('.h')) name += '.c';
  if (files[name]) { showToast('File already exists', '#ff5572'); return; }
  files[name] = `// ${name}\n#include <stdio.h>\n\nint main() {\n    \n    return 0;\n}\n`;
  saveFiles();
  switchFile(name);
  $('newfile-prompt').classList.add('hidden');
  $('newfile-prompt').style.display = 'none';
  showToast(`Created ${name}`, '#caff33');
}

});

// ─── COMPILE & RUN ──────────────────────────────────────
let isCompiling = false;

async function runCode() {
  if (isCompiling) return;
  isCompiling = true;

  compileStatus.classList.remove('hidden');
  compileStatus.style.display = 'flex';
  $('btn-run').style.opacity = '0.6';
  $('btn-run').style.pointerEvents = 'none';
  $('status-dot').style.background = '#f78c6c';
  $('status-text').textContent = 'Compiling...';

  const code = files[activeFile] || '';
  const startTime = Date.now();

  // Try multiple APIs in order of reliability
  const apis = [
    { name: 'Piston', fn: () => runCodeWithPiston(code, startTime) },
    { name: 'OneCompiler', fn: () => runCodeWithOneCompiler(code, startTime) },
    { name: 'TIO', fn: () => runCodeWithTIO(code, startTime) }
  ];

  for (let api of apis) {
    try {
      await api.fn();
      isCompiling = false;
      compileStatus.classList.add('hidden');
      compileStatus.style.display = 'none';
      $('btn-run').style.opacity = '1';
      $('btn-run').style.pointerEvents = 'auto';
      return;
    } catch (err) {
      // Try next API
    }
  }

  // All APIs failed
  outputContent.innerHTML = `<div class="output-text text-xs anim-slide"><span style="color:#ff5572;">⚠ Unable to reach compilation service.\n\nPlease check your internet connection and try again.</span></div>`;
  $('status-dot').style.background = '#ff5572';
  $('status-text').textContent = 'Error';

  isCompiling = false;
  compileStatus.classList.add('hidden');
  compileStatus.style.display = 'none';
  $('btn-run').style.opacity = '1';
  $('btn-run').style.pointerEvents = 'auto';
}

async function runCodeWithPiston(code, startTime) {
  const response = await fetch('https://emkc.org/api/v2/piston/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      language: 'c',
      version: '10.2.0',
      files: [{ name: 'main.c', content: code }],
      stdin: ''
    })
  });

  if (!response.ok) throw new Error('Piston API error');

  const data = await response.json();
  if (!data || typeof data !== 'object') throw new Error('Invalid response');

  const elapsed = Date.now() - startTime;
  let output = '';
  let hasError = false;

  // Check for compilation errors
  if (data.compile && data.compile.stderr) {
    const stderr = data.compile.stderr.trim();
    if (stderr) {
      output += `<span style="color:#ff5572;">⚠ Compilation Error:\n${escHtml(stderr)}</span>\n`;
      hasError = true;
    }
  }

  // Check for runtime errors
  if (data.runtime && data.runtime.stderr) {
    const stderr = data.runtime.stderr.trim();
    if (stderr) {
      output += `<span style="color:#ff5572;">⚠ Runtime Error:\n${escHtml(stderr)}</span>\n`;
      hasError = true;
    }
  }

  // Get program output - check multiple possible locations
  let stdout = '';
  if (data.run && data.run.stdout) {
    stdout = data.run.stdout.trim();
  } else if (data.runtime && data.runtime.stdout) {
    stdout = data.runtime.stdout.trim();
  }

  if (stdout) {
    output += `<span style="color:#c3e88d;">${escHtml(stdout)}</span>\n`;
  } else if (!hasError) {
    output = `<span style="color:rgba(255,255,255,0.3);">(program completed with no output)</span>\n`;
  }

  output += `\n<span style="color:rgba(255,255,255,0.2);">────────────────────────────</span>\n`;
  output += `<span style="color:rgba(255,255,255,0.25);">⏱ ${elapsed}ms</span>`;

  outputContent.innerHTML = `<div class="output-text text-xs anim-slide">${output}</div>`;
  $('status-dot').style.background = hasError ? '#ff5572' : '#caff33';
  $('status-text').textContent = hasError ? 'Error' : 'Success';
}

async function runCodeWithOneCompiler(code, startTime) {
  const formData = new FormData();
  formData.append('code', code);
  formData.append('language', 'c');
  formData.append('stdin', '');

  const response = await fetch('https://onecompiler.com/api/code/execute', {
    method: 'POST',
    body: formData
  });

  if (!response.ok) throw new Error('OneCompiler API error');

  const data = await response.json();
  const elapsed = Date.now() - startTime;
  let output = '';
  let hasError = false;

  if (data.stderr && data.stderr.trim()) {
    output += `<span style="color:#ff5572;">⚠ Error:\n${escHtml(data.stderr)}</span>\n`;
    hasError = true;
  }

  if (data.stdout && data.stdout.trim()) {
    output += `<span style="color:#c3e88d;">${escHtml(data.stdout)}</span>\n`;
  }

  if (!output.trim()) {
    output = `<span style="color:rgba(255,255,255,0.3);">(program completed with no output)</span>\n`;
  }

  output += `\n<span style="color:rgba(255,255,255,0.2);">────────────────────────────</span>\n`;
  output += `<span style="color:rgba(255,255,255,0.25);">⏱ ${elapsed}ms</span>`;

  outputContent.innerHTML = `<div class="output-text text-xs anim-slide">${output}</div>`;
  $('status-dot').style.background = hasError ? '#ff5572' : '#caff33';
  $('status-text').textContent = hasError ? 'Error' : 'Success';
}

async function runCodeWithTIO(code, startTime) {
  const payload = {
    'lang': ['c'],
    'code': [code],
    'args': [[]],
    'TIO_cURL_H2': ['1']
  };

  const response = await fetch('https://tio.run/cgi-bin/run/api/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(payload).toString()
  });

  if (!response.ok) throw new Error('TIO API error');

  const text = await response.text();
  const elapsed = Date.now() - startTime;
  let output = '';
  let hasError = false;

  // TIO returns output directly
  if (text.trim()) {
    // Check if it looks like an error (heuristic)
    if (text.includes('error:') || text.includes('undefined reference')) {
      output += `<span style="color:#ff5572;">⚠ Compilation Error:\n${escHtml(text)}</span>\n`;
      hasError = true;
    } else {
      output += `<span style="color:#c3e88d;">${escHtml(text)}</span>\n`;
    }
  } else {
    output = `<span style="color:rgba(255,255,255,0.3);">(program completed with no output)</span>\n`;
  }

  output += `\n<span style="color:rgba(255,255,255,0.2);">────────────────────────────</span>\n`;
  output += `<span style="color:rgba(255,255,255,0.25);">⏱ ${elapsed}ms</span>`;

  outputContent.innerHTML = `<div class="output-text text-xs anim-slide">${output}</div>`;
  $('status-dot').style.background = hasError ? '#ff5572' : '#caff33';
  $('status-text').textContent = hasError ? 'Error' : 'Success';
}

// ─── FORMAT CODE ────────────────────────────────────────
function formatCode() {
  let code = files[activeFile] || '';
  // Basic C formatting
  let indent = 0;
  const lines = code.split('\n');
  const formatted = [];
  for (let line of lines) {
    let trimmed = line.trim();
    if (!trimmed) { formatted.push(''); continue; }
    if (trimmed.startsWith('}')) indent = Math.max(0, indent - 1);
    formatted.push('    '.repeat(indent) + trimmed);
    if (trimmed.endsWith('{') && !trimmed.startsWith('//') && !trimmed.startsWith('/*')) indent++;
  }
  files[activeFile] = formatted.join('\n');
  codeInput.value = files[activeFile];
  renderEditor();
  saveFiles();
  showToast('Code formatted', '#82aaff');
}

$('btn-format').addEventListener('click', formatCode);

$('btn-download').addEventListener('click', () => {

  const a = document.createElement('a');

// ─── RESIZE HANDLE ──────────────────────────────────────
const resizeHandle = $('resize-handle');
const editorSection = $('editor-section');
const outputSection = $('output-section');
let isResizing = false;

resizeHandle.addEventListener('mousedown', startResize);
resizeHandle.addEventListener('touchstart', startResize, { passive: false });

function startResize(e) {
  e.preventDefault();
  isResizing = true;
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', doResize);
  document.addEventListener('mouseup', stopResize);
  document.addEventListener('touchmove', doResize, { passive: false });
  document.addEventListener('touchend', stopResize);
}

function doResize(e) {
  if (!isResizing) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const wrapper = $('main-wrapper');
  const rect = wrapper.getBoundingClientRect();
  const newEditorH = clientY - rect.top;
  const minEditor = 120;
  const minOutput = 80;
  const totalH = rect.height - resizeHandle.offsetHeight;
  const clampedEditor = Math.min(Math.max(newEditorH, minEditor), totalH - minOutput);
  editorSection.style.flex = 'none';
  editorSection.style.height = clampedEditor + 'px';
  outputSection.style.flex = 'none';
  outputSection.style.height = (totalH - clampedEditor) + 'px';
}

function stopResize() {
  isResizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  document.removeEventListener('mousemove', doResize);
  document.removeEventListener('mouseup', stopResize);
  document.removeEventListener('touchmove', doResize);
  document.removeEventListener('touchend', stopResize);
}

// ─── TOAST ──────────────────────────────────────────────
function showToast(msg, color) {
  const toast = document.createElement('div');
  toast.className = 'toast-msg font-display';
  toast.style.background = color || '#caff33';
  toast.style.color = color === '#ff5572' ? '#fff' : '#0e0e12';
  toast.textContent = msg;
  $('toast-container').appendChild(toast);
  setTimeout(() => toast.remove(), 2200);
}
