  <script>
// ============================================================
// C INTERPRETER ENGINE
// ============================================================

class CInterpreter {
  constructor() {
    this.output = '';
    this.errors = [];
    this.warnings = [];
    this.ast = null;
    this.symbols = new Map();
    this.functions = new Map();
    this.structs = new Map();
    this.callStack = [];
    this.maxIterations = 50000;
    this.iterationCount = 0;
    this.returnValue = undefined;
    this.hasReturned = false;
    this.breakFlag = false;
    this.continueFlag = false;
  }

  compile(source) {
    this.output = '';
    this.errors = [];
    this.warnings = [];
    this.symbols = new Map();
    this.functions = new Map();
    this.structs = new Map();
    this.callStack = [];
    this.iterationCount = 0;
    this.returnValue = undefined;
    this.hasReturned = false;

    try {
      // Preprocessing
      source = this.preprocess(source);
      // Tokenize
      const tokens = this.tokenize(source);
      // Parse
      this.ast = this.parse(tokens);
      // Execute
      this.execute(this.ast);
      return { success: this.errors.length === 0, output: this.output, errors: this.errors, warnings: this.warnings, ast: this.ast, symbols: this.getSymbolTable() };
    } catch (e) {
      this.errors.push({ line: e.line || 0, message: e.message || String(e) });
      return { success: false, output: this.output, errors: this.errors, warnings: this.warnings, ast: this.ast, symbols: this.getSymbolTable() };
    }
  }

  preprocess(src) {
    const lines = src.split('\n');
    const processed = [];
    const defines = {};
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('#include')) {
        // Skip includes, we handle stdlib internally
        continue;
      } else if (trimmed.startsWith('#define')) {
        const m = trimmed.match(/#define\s+(\w+)\s+(.*)/);
        if (m) defines[m[1]] = m[2].trim();
        continue;
      } else if (trimmed.startsWith('#')) {
        continue;
      }
      let processedLine = line;
      for (const [k, v] of Object.entries(defines)) {
        processedLine = processedLine.replace(new RegExp('\\b' + k + '\\b', 'g'), v);
      }
      processed.push(processedLine);
    }
    return processed.join('\n');
  }

  // Tokenizer
  tokenize(src) {
    const tokens = [];
    let i = 0, line = 1, col = 1;
    const keywords = new Set(['int','float','double','char','void','long','short','unsigned','signed','if','else','while','for','do','return','break','continue','switch','case','default','struct','typedef','sizeof','const','static','enum','NULL']);
    while (i < src.length) {
      if (src[i] === '\n') { line++; col = 1; i++; continue; }
      if (/\s/.test(src[i])) { col++; i++; continue; }
      // Single-line comment
      if (src[i] === '/' && src[i+1] === '/') {
        while (i < src.length && src[i] !== '\n') i++;
        continue;
      }
      // Multi-line comment
      if (src[i] === '/' && src[i+1] === '*') {
        i += 2; col += 2;
        while (i < src.length && !(src[i] === '*' && src[i+1] === '/')) {
          if (src[i] === '\n') { line++; col = 1; } else col++;
          i++;
        }
        i += 2; col += 2;
        continue;
      }
      // String literal
      if (src[i] === '"') {
        let s = ''; i++; col++;
        while (i < src.length && src[i] !== '"') {
          if (src[i] === '\\') {
            i++; col++;
            if (src[i] === 'n') s += '\n';
            else if (src[i] === 't') s += '\t';
            else if (src[i] === '\\') s += '\\';
            else if (src[i] === '"') s += '"';
            else if (src[i] === '0') s += '\0';
            else if (src[i] === 'r') s += '\r';
            else s += src[i];
          } else {
            s += src[i];
          }
          i++; col++;
        }
        i++; col++;
        tokens.push({ type: 'STRING', value: s, line, col });
        continue;
      }
      // Char literal
      if (src[i] === "'") {
        i++; col++;
        let ch = src[i];
        if (ch === '\\') { i++; col++; ch = src[i] === 'n' ? '\n' : src[i] === 't' ? '\t' : src[i] === '0' ? '\0' : src[i]; }
        i++; col++;
        if (src[i] === "'") { i++; col++; }
        tokens.push({ type: 'CHAR', value: ch.charCodeAt(0), line, col });
        continue;
      }
      // Numbers
      if (/[0-9]/.test(src[i]) || (src[i] === '.' && /[0-9]/.test(src[i+1]))) {
        let num = '';
        let isFloat = false;
        if (src[i] === '0' && (src[i+1] === 'x' || src[i+1] === 'X')) {
          num += src[i] + src[i+1]; i += 2; col += 2;
          while (i < src.length && /[0-9a-fA-F]/.test(src[i])) { num += src[i]; i++; col++; }
          tokens.push({ type: 'NUMBER', value: parseInt(num, 16), line, col });
          continue;
        }
        while (i < src.length && /[0-9]/.test(src[i])) { num += src[i]; i++; col++; }
        if (i < src.length && src[i] === '.') { isFloat = true; num += '.'; i++; col++; while (i < src.length && /[0-9]/.test(src[i])) { num += src[i]; i++; col++; } }
        if (i < src.length && (src[i] === 'f' || src[i] === 'F')) { isFloat = true; i++; col++; }
        tokens.push({ type: 'NUMBER', value: isFloat ? parseFloat(num) : parseInt(num), line, col });
        continue;
      }
      // Identifiers & keywords
      if (/[a-zA-Z_]/.test(src[i])) {
        let id = '';
        while (i < src.length && /[a-zA-Z0-9_]/.test(src[i])) { id += src[i]; i++; col++; }
        if (keywords.has(id)) tokens.push({ type: 'KEYWORD', value: id, line, col });
        else tokens.push({ type: 'IDENT', value: id, line, col });
        continue;
      }
      // Multi-char operators
      const ops2 = ['==','!=','<=','>=','&&','||','++','--','+=','-=','*=','/=','%=','<<','>>','->'];
      let found = false;
      for (const op of ops2) {
        if (src.substring(i, i+op.length) === op) {
          tokens.push({ type: 'OP', value: op, line, col });
          i += op.length; col += op.length;
          found = true; break;
        }
      }
      if (found) continue;
      // Single char
      tokens.push({ type: 'OP', value: src[i], line, col });
      i++; col++;
    }
    tokens.push({ type: 'EOF', value: '', line, col });
    return tokens;
  }

  // Parser
  parse(tokens) {
    let pos = 0;
    const peek = () => tokens[pos] || { type: 'EOF', value: '', line: 0 };
    const eat = (type, value) => {
      const t = peek();
      if (type && t.type !== type) throw { line: t.line, message: `Expected ${type} but got ${t.type} '${t.value}'` };
      if (value !== undefined && t.value !== value) throw { line: t.line, message: `Expected '${value}' but got '${t.value}'` };
      pos++;
      return t;
    };
    const check = (type, value) => { const t = peek(); return t.type === type && (value === undefined || t.value === value); };

    const isType = () => {
      const v = peek().value;
      return ['int','float','double','char','void','long','short','unsigned','signed','const','static','struct','enum'].includes(v) || this.structs.has(v);
    };

    const parseType = () => {
      let type = '';
      while (check('KEYWORD') && ['const','static','unsigned','signed','long','short','struct','enum'].includes(peek().value)) {
        type += eat('KEYWORD').value + ' ';
      }
      if (check('KEYWORD') && ['int','float','double','char','void'].includes(peek().value)) {
        type += eat('KEYWORD').value;
      } else if (check('IDENT') && this.structs.has(peek().value)) {
        type += eat('IDENT').value;
      } else if (type.trim()) {
        type = type.trim();
        if (type.endsWith('long') || type.endsWith('short') || type.endsWith('unsigned') || type.endsWith('signed')) type += ' int';
      } else {
        throw { line: peek().line, message: `Expected type but got '${peek().value}'` };
      }
      let ptr = 0;
      while (check('OP', '*')) { eat('OP', '*'); ptr++; }
      return { baseType: type.trim(), pointerLevel: ptr };
    };

    const parseProgram = () => {
      const declarations = [];
      while (!check('EOF')) {
        if (check('KEYWORD', 'struct')) {
          declarations.push(parseStructDecl());
        } else if (check('KEYWORD', 'typedef')) {
          declarations.push(parseTypedef());
        } else if (check('KEYWORD', 'enum')) {
          declarations.push(parseEnumDecl());
        } else if (isType()) {
          declarations.push(parseFuncOrVarDecl());
        } else {
          throw { line: peek().line, message: `Unexpected token '${peek().value}'` };
        }
      }
      return { type: 'Program', declarations, line: 1 };
    };

    const parseStructDecl = () => {
      const ln = peek().line;
      eat('KEYWORD', 'struct');
      const name = eat('IDENT').value;
      eat('OP', '{');
      const fields = [];
      while (!check('OP', '}')) {
        const fType = parseType();
        const fName = eat('IDENT').value;
        let arraySize = null;
        if (check('OP', '[')) { eat('OP', '['); arraySize = eat('NUMBER').value; eat('OP', ']'); }
        eat('OP', ';');
        fields.push({ fieldType: fType, name: fName, arraySize });
      }
      eat('OP', '}');
      eat('OP', ';');
      this.structs.set(name, fields);
      return { type: 'StructDecl', name, fields, line: ln };
    };

    const parseTypedef = () => {
      const ln = peek().line;
      eat('KEYWORD', 'typedef');
      if (check('KEYWORD', 'struct')) {
        const sd = parseStructDecl();
        // We expect an alias before the ;... but our struct already ate ;
        // Simplified: just register it
        return sd;
      }
      const base = parseType();
      const alias = eat('IDENT').value;
      eat('OP', ';');
      return { type: 'Typedef', base, alias, line: ln };
    };

    const parseEnumDecl = () => {
      const ln = peek().line;
      eat('KEYWORD', 'enum');
      let name = null;
      if (check('IDENT')) name = eat('IDENT').value;
      eat('OP', '{');
      const members = [];
      let val = 0;
      while (!check('OP', '}')) {
        const mName = eat('IDENT').value;
        if (check('OP', '=')) { eat('OP', '='); val = eat('NUMBER').value; }
        members.push({ name: mName, value: val });
        val++;
        if (check('OP', ',')) eat('OP', ',');
      }
      eat('OP', '}');
      eat('OP', ';');
      return { type: 'EnumDecl', name, members, line: ln };
    };

    const parseFuncOrVarDecl = () => {
      const ln = peek().line;
      const declType = parseType();
      const name = eat('IDENT').value;
      // Function
      if (check('OP', '(')) {
        eat('OP', '(');
        const params = [];
        while (!check('OP', ')')) {
          if (check('KEYWORD', 'void') && tokens[pos+1] && tokens[pos+1].value === ')') { eat('KEYWORD'); break; }
          const pType = parseType();
          let pName = '';
          if (check('IDENT')) pName = eat('IDENT').value;
          let arrSize = null;
          if (check('OP', '[')) { eat('OP', '['); if (check('NUMBER')) arrSize = eat('NUMBER').value; eat('OP', ']'); }
          params.push({ paramType: pType, name: pName, arraySize: arrSize });
          if (check('OP', ',')) eat('OP', ',');
        }
        eat('OP', ')');
        if (check('OP', ';')) { eat('OP', ';'); return { type: 'FuncPrototype', returnType: declType, name, params, line: ln }; }
        const body = parseBlock();
        return { type: 'FuncDecl', returnType: declType, name, params, body, line: ln };
      }
      // Variable(s)
      return parseVarDeclRest(declType, name, ln);
    };

    const parseVarDeclRest = (declType, firstName, ln) => {
      const vars = [];
      let arrSize = null, init = null;
      if (check('OP', '[')) { eat('OP', '['); if (!check('OP', ']')) arrSize = parseExpr(); eat('OP', ']'); }
      if (check('OP', '=')) { eat('OP', '='); init = check('OP', '{') ? parseArrayInit() : parseExpr(); }
      vars.push({ name: firstName, arraySize: arrSize, init });
      while (check('OP', ',')) {
        eat('OP', ',');
        let ptr = 0;
        while (check('OP', '*')) { eat('OP', '*'); ptr++; }
        const nm = eat('IDENT').value;
        let as2 = null, in2 = null;
        if (check('OP', '[')) { eat('OP', '['); if (!check('OP', ']')) as2 = parseExpr(); eat('OP', ']'); }
        if (check('OP', '=')) { eat('OP', '='); in2 = check('OP', '{') ? parseArrayInit() : parseExpr(); }
        vars.push({ name: nm, arraySize: as2, init: in2, extraPointer: ptr });
      }
      eat('OP', ';');
      return { type: 'VarDecl', varType: declType, vars, line: ln };
    };

    const parseArrayInit = () => {
      eat('OP', '{');
      const elements = [];
      while (!check('OP', '}')) {
        if (check('OP', '{')) elements.push(parseArrayInit());
        else elements.push(parseExpr());
        if (check('OP', ',')) eat('OP', ',');
      }
      eat('OP', '}');
      return { type: 'ArrayInit', elements };
    };

    const parseBlock = () => {
      const ln = peek().line;
      eat('OP', '{');
      const stmts = [];
      while (!check('OP', '}')) {
        stmts.push(parseStatement());
      }
      eat('OP', '}');
      return { type: 'Block', statements: stmts, line: ln };
    };

    const parseStatement = () => {
      if (check('OP', '{')) return parseBlock();
      if (check('KEYWORD', 'if')) return parseIf();
      if (check('KEYWORD', 'while')) return parseWhile();
      if (check('KEYWORD', 'for')) return parseFor();
      if (check('KEYWORD', 'do')) return parseDoWhile();
      if (check('KEYWORD', 'return')) return parseReturn();
      if (check('KEYWORD', 'break')) { const ln = peek().line; eat('KEYWORD'); eat('OP', ';'); return { type: 'Break', line: ln }; }
      if (check('KEYWORD', 'continue')) { const ln = peek().line; eat('KEYWORD'); eat('OP', ';'); return { type: 'Continue', line: ln }; }
      if (check('KEYWORD', 'switch')) return parseSwitch();
      // Variable declaration
      if (isType() && peek().type === 'KEYWORD') {
        const saved = pos;
        try {
          const declType = parseType();
          if (check('IDENT')) {
            const name = eat('IDENT').value;
            return parseVarDeclRest(declType, name, peek().line);
          }
          pos = saved;
        } catch(e) { pos = saved; }
      }
      // Expression statement
      const ln = peek().line;
      const expr = parseExpr();
      eat('OP', ';');
      return { type: 'ExprStmt', expr, line: ln };
    };

    const parseIf = () => {
      const ln = peek().line;
      eat('KEYWORD', 'if');
      eat('OP', '(');
      const cond = parseExpr();
      eat('OP', ')');
      const then = parseStatement();
      let els = null;
      if (check('KEYWORD', 'else')) { eat('KEYWORD'); els = parseStatement(); }
      return { type: 'If', condition: cond, then, else: els, line: ln };
    };

    const parseWhile = () => {
      const ln = peek().line;
      eat('KEYWORD', 'while');
      eat('OP', '(');
      const cond = parseExpr();
      eat('OP', ')');
      const body = parseStatement();
      return { type: 'While', condition: cond, body, line: ln };
    };

    const parseFor = () => {
      const ln = peek().line;
      eat('KEYWORD', 'for');
      eat('OP', '(');
      let init = null;
      if (!check('OP', ';')) {
        if (isType() && peek().type === 'KEYWORD') {
          const declType = parseType();
          const name = eat('IDENT').value;
          init = parseVarDeclRest(declType, name, ln);
        } else {
          init = parseExpr();
          eat('OP', ';');
        }
      } else { eat('OP', ';'); }
      let cond = null;
      if (!check('OP', ';')) cond = parseExpr();
      eat('OP', ';');
      let update = null;
      if (!check('OP', ')')) update = parseExpr();
      eat('OP', ')');
      const body = parseStatement();
      return { type: 'For', init, condition: cond, update, body, line: ln };
    };

    const parseDoWhile = () => {
      const ln = peek().line;
      eat('KEYWORD', 'do');
      const body = parseStatement();
      eat('KEYWORD', 'while');
      eat('OP', '(');
      const cond = parseExpr();
      eat('OP', ')');
      eat('OP', ';');
      return { type: 'DoWhile', condition: cond, body, line: ln };
    };

    const parseReturn = () => {
      const ln = peek().line;
      eat('KEYWORD', 'return');
      let value = null;
      if (!check('OP', ';')) value = parseExpr();
      eat('OP', ';');
      return { type: 'Return', value, line: ln };
    };

    const parseSwitch = () => {
      const ln = peek().line;
      eat('KEYWORD', 'switch');
      eat('OP', '(');
      const expr = parseExpr();
      eat('OP', ')');
      eat('OP', '{');
      const cases = [];
      while (!check('OP', '}')) {
        if (check('KEYWORD', 'case')) {
          eat('KEYWORD');
          const val = parseExpr();
          eat('OP', ':');
          const stmts = [];
          while (!check('KEYWORD', 'case') && !check('KEYWORD', 'default') && !check('OP', '}')) {
            stmts.push(parseStatement());
          }
          cases.push({ type: 'Case', value: val, body: stmts, line: ln });
        } else if (check('KEYWORD', 'default')) {
          eat('KEYWORD');
          eat('OP', ':');
          const stmts = [];
          while (!check('KEYWORD', 'case') && !check('OP', '}')) {
            stmts.push(parseStatement());
          }
          cases.push({ type: 'Default', body: stmts, line: ln });
        }
      }
      eat('OP', '}');
      return { type: 'Switch', expr, cases, line: ln };
    };

    // Expression parsing with precedence climbing
    const parseExpr = () => parseAssign();

    const parseAssign = () => {
      let left = parseTernary();
      if (check('OP', '=') || check('OP', '+=') || check('OP', '-=') || check('OP', '*=') || check('OP', '/=') || check('OP', '%=')) {
        const op = eat('OP').value;
        const right = parseAssign();
        return { type: 'Assign', op, left, right, line: left.line };
      }
      return left;
    };

    const parseTernary = () => {
      let cond = parseOr();
      if (check('OP', '?')) {
        eat('OP', '?');
        const then = parseExpr();
        eat('OP', ':');
        const els = parseTernary();
        return { type: 'Ternary', condition: cond, then, else: els, line: cond.line };
      }
      return cond;
    };

    const parseOr = () => { let l = parseAnd(); while (check('OP', '||')) { eat('OP'); l = { type: 'BinOp', op: '||', left: l, right: parseAnd(), line: l.line }; } return l; };
    const parseAnd = () => { let l = parseBitOr(); while (check('OP', '&&')) { eat('OP'); l = { type: 'BinOp', op: '&&', left: l, right: parseBitOr(), line: l.line }; } return l; };
    const parseBitOr = () => { let l = parseBitXor(); while (check('OP', '|') && !check('OP', '||')) { eat('OP'); l = { type: 'BinOp', op: '|', left: l, right: parseBitXor(), line: l.line }; } return l; };
    const parseBitXor = () => { let l = parseBitAnd(); while (check('OP', '^')) { eat('OP'); l = { type: 'BinOp', op: '^', left: l, right: parseBitAnd(), line: l.line }; } return l; };
    const parseBitAnd = () => { let l = parseEquality(); while (check('OP', '&') && !check('OP', '&&')) { eat('OP'); l = { type: 'BinOp', op: '&', left: l, right: parseEquality(), line: l.line }; } return l; };
    const parseEquality = () => { let l = parseRelational(); while (check('OP', '==') || check('OP', '!=')) { const op = eat('OP').value; l = { type: 'BinOp', op, left: l, right: parseRelational(), line: l.line }; } return l; };
    const parseRelational = () => { let l = parseShift(); while (check('OP', '<') || check('OP', '>') || check('OP', '<=') || check('OP', '>=')) { const op = eat('OP').value; l = { type: 'BinOp', op, left: l, right: parseShift(), line: l.line }; } return l; };
    const parseShift = () => { let l = parseAdd(); while (check('OP', '<<') || check('OP', '>>')) { const op = eat('OP').value; l = { type: 'BinOp', op, left: l, right: parseAdd(), line: l.line }; } return l; };
    const parseAdd = () => { let l = parseMul(); while (check('OP', '+') || check('OP', '-')) { const op = eat('OP').value; l = { type: 'BinOp', op, left: l, right: parseMul(), line: l.line }; } return l; };
    const parseMul = () => { let l = parseUnary(); while (check('OP', '*') || check('OP', '/') || check('OP', '%')) { const op = eat('OP').value; l = { type: 'BinOp', op, left: l, right: parseUnary(), line: l.line }; } return l; };

    const parseUnary = () => {
      const ln = peek().line;
      if (check('OP', '!')) { eat('OP'); return { type: 'UnaryOp', op: '!', expr: parseUnary(), line: ln }; }
      if (check('OP', '-') && !['NUMBER','IDENT','OP'].includes(tokens[pos-1]?.type)) { eat('OP'); return { type: 'UnaryOp', op: '-', expr: parseUnary(), line: ln }; }
      if (check('OP', '&')) { eat('OP'); return { type: 'UnaryOp', op: '&', expr: parseUnary(), line: ln }; }
      if (check('OP', '*') && (pos === 0 || ['OP','KEYWORD'].includes(tokens[pos-1]?.type) && tokens[pos-1]?.value !== ')')) { eat('OP'); return { type: 'UnaryOp', op: '*', expr: parseUnary(), line: ln }; }
      if (check('OP', '++')) { eat('OP'); return { type: 'PreInc', expr: parseUnary(), line: ln }; }
      if (check('OP', '--')) { eat('OP'); return { type: 'PreDec', expr: parseUnary(), line: ln }; }
      if (check('KEYWORD', 'sizeof')) { eat('KEYWORD'); eat('OP', '('); let inner; if (isType()) { inner = parseType(); } else { inner = parseExpr(); } eat('OP', ')'); return { type: 'Sizeof', expr: inner, line: ln }; }
      // Cast
      if (check('OP', '(') && pos + 1 < tokens.length) {
        const saved = pos;
        try {
          eat('OP', '(');
          if (isType()) {
            const castType = parseType();
            eat('OP', ')');
            const expr = parseUnary();
            return { type: 'Cast', castType, expr, line: ln };
          }
          pos = saved;
        } catch(e) { pos = saved; }
      }
      return parsePostfix();
    };

    const parsePostfix = () => {
      let expr = parsePrimary();
      while (true) {
        if (check('OP', '(')) {
          eat('OP', '(');
          const args = [];
          while (!check('OP', ')')) {
            args.push(parseExpr());
            if (check('OP', ',')) eat('OP', ',');
          }
          eat('OP', ')');
          expr = { type: 'Call', callee: expr, args, line: expr.line };
        } else if (check('OP', '[')) {
          eat('OP', '[');
          const index = parseExpr();
          eat('OP', ']');
          expr = { type: 'Index', object: expr, index, line: expr.line };
        } else if (check('OP', '.')) {
          eat('OP', '.');
          const field = eat('IDENT').value;
          expr = { type: 'MemberAccess', object: expr, field, line: expr.line };
        } else if (check('OP', '->')) {
          eat('OP', '->');
          const field = eat('IDENT').value;
          expr = { type: 'PtrAccess', object: expr, field, line: expr.line };
        } else if (check('OP', '++')) {
          eat('OP'); expr = { type: 'PostInc', expr, line: expr.line };
        } else if (check('OP', '--')) {
          eat('OP'); expr = { type: 'PostDec', expr, line: expr.line };
        } else break;
      }
      return expr;
    };

    const parsePrimary = () => {
      const ln = peek().line;
      if (check('NUMBER')) return { type: 'NumberLiteral', value: eat('NUMBER').value, line: ln };
      if (check('STRING')) return { type: 'StringLiteral', value: eat('STRING').value, line: ln };
      if (check('CHAR')) return { type: 'NumberLiteral', value: eat('CHAR').value, line: ln };
      if (check('KEYWORD', 'NULL')) { eat('KEYWORD'); return { type: 'NumberLiteral', value: 0, line: ln }; }
      if (check('IDENT')) return { type: 'Identifier', name: eat('IDENT').value, line: ln };
      if (check('OP', '(')) { eat('OP', '('); const expr = parseExpr(); eat('OP', ')'); return expr; }
      throw { line: ln, message: `Unexpected token '${peek().value}'` };
    };

    return parseProgram();
  }

  // Executor
  execute(ast) {
    // Register all functions and global vars
    for (const decl of ast.declarations) {
      if (decl.type === 'FuncDecl') {
        this.functions.set(decl.name, decl);
      } else if (decl.type === 'VarDecl') {
        this.execVarDecl(decl, this.symbols);
      } else if (decl.type === 'EnumDecl') {
        for (const m of decl.members) {
          this.symbols.set(m.name, { type: 'int', value: m.value });
        }
      }
    }
    // Call main
    if (this.functions.has('main')) {
      this.callFunction('main', []);
    } else {
      this.warnings.push({ line: 0, message: "Warning: no main() function found" });
    }
  }

  execVarDecl(decl, scope) {
    for (const v of decl.vars) {
      let value;
      if (v.arraySize) {
        const size = typeof v.arraySize === 'object' ? this.evalExpr(v.arraySize, scope) : v.arraySize;
        if (v.init && v.init.type === 'ArrayInit') {
          value = v.init.elements.map(e => e.type === 'ArrayInit' ? e.elements.map(e2 => this.evalExpr(e2, scope)) : this.evalExpr(e, scope));
          while (value.length < size) value.push(0);
        } else if (v.init && v.init.type === 'StringLiteral') {
          value = v.init.value.split('').map(c => c.charCodeAt(0));
          value.push(0);
        } else {
          value = new Array(size).fill(0);
        }
      } else if (v.init) {
        if (v.init.type === 'ArrayInit') {
          value = v.init.elements.map(e => this.evalExpr(e, scope));
        } else if (v.init.type === 'StringLiteral') {
          value = v.init.value.split('').map(c => c.charCodeAt(0));
          value.push(0);
        } else {
          value = this.evalExpr(v.init, scope);
        }
      } else if (decl.varType.baseType.includes('char') && decl.varType.pointerLevel > 0) {
        value = null;
      } else if (decl.varType.baseType.includes('struct')) {
        const sName = decl.varType.baseType.replace('struct ', '');
        const fields = this.structs.get(sName);
        if (fields) {
          value = {};
          for (const f of fields) {
            value[f.name] = f.arraySize ? new Array(f.arraySize).fill(0) : 0;
          }
        } else value = {};
      } else {
        value = 0;
      }
      scope.set(v.name, { type: decl.varType, value });
    }
  }

  callFunction(name, args) {
    if (this.iterationCount++ > this.maxIterations) throw { line: 0, message: 'Execution limit exceeded (possible infinite loop)' };

    // Built-in functions
    const builtin = this.getBuiltin(name, args);
    if (builtin !== undefined) return builtin;

    const func = this.functions.get(name);
    if (!func) throw { line: 0, message: `Undefined function: ${name}` };

    const localScope = new Map(this.symbols);
    for (let i = 0; i < func.params.length; i++) {
      const val = i < args.length ? args[i] : 0;
      localScope.set(func.params[i].name, { type: func.params[i].paramType, value: val });
    }

    this.callStack.push(name);
    const oldReturn = this.hasReturned;
    this.hasReturned = false;
    this.returnValue = undefined;

    this.execBlock(func.body, localScope);

    const retVal = this.returnValue;
    this.hasReturned = oldReturn;
    this.returnValue = undefined;
    this.callStack.pop();
    return retVal !== undefined ? retVal : 0;
  }

  getBuiltin(name, args) {
    switch (name) {
      case 'printf': return this.builtinPrintf(args);
      case 'sprintf': return this.builtinSprintf(args);
      case 'scanf': return this.builtinScanf(args);
      case 'puts': this.output += String(args[0]) + '\n'; return 0;
      case 'putchar': this.output += String.fromCharCode(args[0]); return args[0];
      case 'getchar': return 0;
      case 'strlen': return Array.isArray(args[0]) ? args[0].indexOf(0) : String(args[0]).length;
      case 'strcpy': if (Array.isArray(args[0]) && Array.isArray(args[1])) { for (let i=0;i<args[1].length;i++) args[0][i]=args[1][i]; } return args[0];
      case 'strcat': if (Array.isArray(args[0]) && Array.isArray(args[1])) { const end = args[0].indexOf(0); for (let i=0;i<args[1].length;i++) args[0][end+i]=args[1][i]; } return args[0];
      case 'strcmp': { const s1 = this.arrToStr(args[0]), s2 = this.arrToStr(args[1]); return s1 < s2 ? -1 : s1 > s2 ? 1 : 0; }
      case 'atoi': return parseInt(this.arrToStr(args[0])) || 0;
      case 'atof': return parseFloat(this.arrToStr(args[0])) || 0;
      case 'abs': return Math.abs(args[0]);
      case 'sqrt': return Math.sqrt(args[0]);
      case 'pow': return Math.pow(args[0], args[1]);
      case 'sin': return Math.sin(args[0]);
      case 'cos': return Math.cos(args[0]);
      case 'tan': return Math.tan(args[0]);
      case 'log': return Math.log(args[0]);
      case 'ceil': return Math.ceil(args[0]);
      case 'floor': return Math.floor(args[0]);
      case 'round': return Math.round(args[0]);
      case 'fabs': return Math.abs(args[0]);
      case 'rand': return Math.floor(Math.random() * 32768);
      case 'srand': return 0;
      case 'time': return Math.floor(Date.now() / 1000);
      case 'malloc': return new Array(args[0]).fill(0);
      case 'calloc': return new Array(args[0] * (args[1]||1)).fill(0);
      case 'free': return 0;
      case 'memset': if (Array.isArray(args[0])) args[0].fill(args[1], 0, args[2]); return args[0];
      case 'memcpy': if (Array.isArray(args[0]) && Array.isArray(args[1])) { for(let i=0;i<args[2];i++) args[0][i]=args[1][i]; } return args[0];
      case 'exit': throw { line: 0, message: `Program exited with code ${args[0]}`, isExit: true };
      case 'toupper': return args[0] >= 97 && args[0] <= 122 ? args[0] - 32 : args[0];
      case 'tolower': return args[0] >= 65 && args[0] <= 90 ? args[0] + 32 : args[0];
      case 'isalpha': return (args[0] >= 65 && args[0] <= 90) || (args[0] >= 97 && args[0] <= 122) ? 1 : 0;
      case 'isdigit': return args[0] >= 48 && args[0] <= 57 ? 1 : 0;
      case 'isspace': return [32,9,10,13].includes(args[0]) ? 1 : 0;
      default: return undefined;
    }
  }

  arrToStr(a) {
    if (typeof a === 'string') return a;
    if (Array.isArray(a)) { const end = a.indexOf(0); const s = a.slice(0, end >= 0 ? end : a.length); return s.map(c => String.fromCharCode(c)).join(''); }
    return String(a);
  }

  builtinPrintf(args) {
    if (args.length === 0) return 0;
    let fmt = typeof args[0] === 'string' ? args[0] : this.arrToStr(args[0]);
    let argIdx = 1;
    let result = '';
    let i = 0;
    while (i < fmt.length) {
      if (fmt[i] === '%' && i + 1 < fmt.length) {
        i++;
        let flags = '', width = '', precision = '';
        while ('-+0 #'.includes(fmt[i])) { flags += fmt[i]; i++; }
        while (fmt[i] >= '0' && fmt[i] <= '9') { width += fmt[i]; i++; }
        if (fmt[i] === '.') { i++; while (fmt[i] >= '0' && fmt[i] <= '9') { precision += fmt[i]; i++; } }
        // Length modifiers
        if (fmt[i] === 'l' || fmt[i] === 'h') i++;
        const spec = fmt[i]; i++;
        const val = argIdx < args.length ? args[argIdx++] : 0;
        switch (spec) {
          case 'd': case 'i': { let s = Math.trunc(Number(val)).toString(); if (flags.includes('+') && Number(val) >= 0) s = '+' + s; if (width) s = s.padStart(parseInt(width), flags.includes('0') ? '0' : ' '); result += s; break; }
          case 'u': result += (Math.trunc(Number(val)) >>> 0).toString(); break;
          case 'f': { const p = precision ? parseInt(precision) : 6; let s = Number(val).toFixed(p); if (width) s = s.padStart(parseInt(width)); result += s; break; }
          case 'e': { const p = precision ? parseInt(precision) : 6; result += Number(val).toExponential(p); break; }
          case 'g': { const p = precision ? parseInt(precision) : 6; result += Number(val).toPrecision(p); break; }
          case 'c': result += String.fromCharCode(Number(val)); break;
          case 's': result += this.arrToStr(val); break;
          case 'x': result += (Math.trunc(Number(val)) >>> 0).toString(16); break;
          case 'X': result += (Math.trunc(Number(val)) >>> 0).toString(16).toUpperCase(); break;
          case 'o': result += (Math.trunc(Number(val)) >>> 0).toString(8); break;
          case 'p': result += '0x' + (Number(val) >>> 0).toString(16); break;
          case '%': result += '%'; argIdx--; break;
          default: result += '%' + spec;
        }
      } else {
        result += fmt[i]; i++;
      }
    }
    this.output += result;
    return result.length;
  }

  builtinSprintf(args) {
    if (args.length < 2) return 0;
    const dest = args[0];
    const saved = this.output;
    this.output = '';
    this.builtinPrintf(args.slice(1));
    const result = this.output;
    this.output = saved;
    if (Array.isArray(dest)) {
      for (let i = 0; i < result.length; i++) dest[i] = result.charCodeAt(i);
      dest[result.length] = 0;
    }
    return result.length;
  }

  builtinScanf() { this.warnings.push({ line: 0, message: "scanf() not supported in browser — using default values" }); return 0; }

  execBlock(block, scope) {
    if (!block || !block.statements) return;
    for (const stmt of block.statements) {
      if (this.hasReturned || this.breakFlag || this.continueFlag) return;
      this.execStmt(stmt, scope);
    }
  }

  execStmt(stmt, scope) {
    if (this.iterationCount++ > this.maxIterations) throw { line: stmt?.line||0, message: 'Execution limit exceeded (possible infinite loop)' };
    if (this.hasReturned || this.breakFlag || this.continueFlag) return;
    if (!stmt) return;
    switch (stmt.type) {
      case 'Block': this.execBlock(stmt, scope); break;
      case 'VarDecl': this.execVarDecl(stmt, scope); break;
      case 'ExprStmt': this.evalExpr(stmt.expr, scope); break;
      case 'If':
        if (this.evalExpr(stmt.condition, scope)) this.execStmt(stmt.then, scope);
        else if (stmt.else) this.execStmt(stmt.else, scope);
        break;
      case 'While':
        while (!this.hasReturned && !this.breakFlag && this.evalExpr(stmt.condition, scope)) {
          this.continueFlag = false;
          this.execStmt(stmt.body, scope);
          if (this.iterationCount++ > this.maxIterations) throw { line: stmt.line, message: 'Execution limit exceeded' };
        }
        this.breakFlag = false; this.continueFlag = false;
        break;
      case 'DoWhile':
        do {
          this.continueFlag = false;
          this.execStmt(stmt.body, scope);
          if (this.iterationCount++ > this.maxIterations) throw { line: stmt.line, message: 'Execution limit exceeded' };
        } while (!this.hasReturned && !this.breakFlag && this.evalExpr(stmt.condition, scope));
        this.breakFlag = false; this.continueFlag = false;
        break;
      case 'For': {
        if (stmt.init) {
          if (stmt.init.type === 'VarDecl') this.execVarDecl(stmt.init, scope);
          else this.evalExpr(stmt.init, scope);
        }
        while (!this.hasReturned && !this.breakFlag && (!stmt.condition || this.evalExpr(stmt.condition, scope))) {
          this.continueFlag = false;
          this.execStmt(stmt.body, scope);
          if (this.continueFlag) this.continueFlag = false;
          if (this.breakFlag || this.hasReturned) break;
          if (stmt.update) this.evalExpr(stmt.update, scope);
          if (this.iterationCount++ > this.maxIterations) throw { line: stmt.line, message: 'Execution limit exceeded' };
        }
        this.breakFlag = false;
        break;
      }
      case 'Return':
        this.returnValue = stmt.value ? this.evalExpr(stmt.value, scope) : 0;
        this.hasReturned = true;
        break;
      case 'Break': this.breakFlag = true; break;
      case 'Continue': this.continueFlag = true; break;
      case 'Switch': {
        const val = this.evalExpr(stmt.expr, scope);
        let matched = false;
        for (const c of stmt.cases) {
          if (!matched && c.type === 'Case' && this.evalExpr(c.value, scope) === val) matched = true;
          if (!matched && c.type === 'Default') matched = true;
          if (matched) {
            for (const s of c.body) {
              this.execStmt(s, scope);
              if (this.breakFlag || this.hasReturned) break;
            }
            if (this.breakFlag) { this.breakFlag = false; return; }
            if (this.hasReturned) return;
          }
        }
        break;
      }
    }
  }

  evalExpr(expr, scope) {
    if (!expr) return 0;
    if (!scope) scope = this.symbols;
    switch (expr.type) {
      case 'NumberLiteral': return expr.value;
      case 'StringLiteral': return expr.value;
      case 'Identifier': {
        const v = scope.get(expr.name);
        if (v === undefined) {
          // Check if it's a function name
          if (this.functions.has(expr.name)) return expr.name;
          throw { line: expr.line, message: `Undefined variable: ${expr.name}` };
        }
        return v.value;
      }
      case 'BinOp': return this.evalBinOp(expr, scope);
      case 'UnaryOp': return this.evalUnaryOp(expr, scope);
      case 'Assign': return this.evalAssign(expr, scope);
      case 'Call': {
        const callee = expr.callee.type === 'Identifier' ? expr.callee.name : this.evalExpr(expr.callee, scope);
        const args = expr.args.map(a => this.evalExpr(a, scope));
        return this.callFunction(callee, args);
      }
      case 'Index': {
        const obj = this.evalExpr(expr.object, scope);
        const idx = this.evalExpr(expr.index, scope);
        if (Array.isArray(obj)) return obj[idx] !== undefined ? obj[idx] : 0;
        return 0;
      }
      case 'MemberAccess': {
        const obj = this.evalExpr(expr.object, scope);
        if (obj && typeof obj === 'object' && !Array.isArray(obj)) return obj[expr.field] !== undefined ? obj[expr.field] : 0;
        return 0;
      }
      case 'PtrAccess': return this.evalExpr({ ...expr, type: 'MemberAccess' }, scope);
      case 'PostInc': { const v = this.evalExpr(expr.expr, scope); this.setLValue(expr.expr, scope, v + 1); return v; }
      case 'PostDec': { const v = this.evalExpr(expr.expr, scope); this.setLValue(expr.expr, scope, v - 1); return v; }
      case 'PreInc': { const v = this.evalExpr(expr.expr, scope) + 1; this.setLValue(expr.expr, scope, v); return v; }
      case 'PreDec': { const v = this.evalExpr(expr.expr, scope) - 1; this.setLValue(expr.expr, scope, v); return v; }
      case 'Cast': return this.evalExpr(expr.expr, scope);
      case 'Sizeof': return 4;
      case 'Ternary': return this.evalExpr(expr.condition, scope) ? this.evalExpr(expr.then, scope) : this.evalExpr(expr.else, scope);
      case 'ArrayInit': return expr.elements.map(e => this.evalExpr(e, scope));
      default: return 0;
    }
  }

  evalBinOp(expr, scope) {
    const l = this.evalExpr(expr.left, scope);
    // Short-circuit for && and ||
    if (expr.op === '&&') return l ? this.evalExpr(expr.right, scope) : 0;
    if (expr.op === '||') return l ? l : this.evalExpr(expr.right, scope);
    const r = this.evalExpr(expr.right, scope);
    switch (expr.op) {
      case '+': return l + r;
      case '-': return l - r;
      case '*': return l * r;
      case '/': if (r === 0) { this.warnings.push({ line: expr.line, message: 'Division by zero' }); return 0; } return Number.isInteger(l) && Number.isInteger(r) ? Math.trunc(l / r) : l / r;
      case '%': return l % r;
      case '==': return l === r ? 1 : 0;
      case '!=': return l !== r ? 1 : 0;
      case '<': return l < r ? 1 : 0;
      case '>': return l > r ? 1 : 0;
      case '<=': return l <= r ? 1 : 0;
      case '>=': return l >= r ? 1 : 0;
      case '&': return l & r;
      case '|': return l | r;
      case '^': return l ^ r;
      case '<<': return l << r;
      case '>>': return l >> r;
      default: return 0;
    }
  }

  evalUnaryOp(expr, scope) {
    const v = this.evalExpr(expr.expr, scope);
    switch (expr.op) {
      case '-': return -v;
      case '!': return v ? 0 : 1;
      case '&': return v; // Simplified pointer
      case '*': return v; // Simplified dereference
      default: return v;
    }
  }

  evalAssign(expr, scope) {
    let val = this.evalExpr(expr.right, scope);
    if (expr.op !== '=') {
      const cur = this.evalExpr(expr.left, scope);
      switch (expr.op) {
        case '+=': val = cur + val; break;
        case '-=': val = cur - val; break;
        case '*=': val = cur * val; break;
        case '/=': val = cur / val; break;
        case '%=': val = cur % val; break;
      }
    }
    this.setLValue(expr.left, scope, val);
    return val;
  }

  setLValue(expr, scope, value) {
    if (expr.type === 'Identifier') {
      const v = scope.get(expr.name);
      if (v) v.value = value;
      else scope.set(expr.name, { type: 'auto', value });
    } else if (expr.type === 'Index') {
      const obj = this.evalExpr(expr.object, scope);
      const idx = this.evalExpr(expr.index, scope);
      if (Array.isArray(obj)) obj[idx] = value;
    } else if (expr.type === 'MemberAccess' || expr.type === 'PtrAccess') {
      const obj = this.evalExpr(expr.object, scope);
      if (obj && typeof obj === 'object') obj[expr.field] = value;
    }
  }

  getSymbolTable() {
    const table = [];
    for (const [name, data] of this.symbols) {
      table.push({ name, type: typeof data.type === 'object' ? (data.type.baseType + (data.type.pointerLevel ? '*'.repeat(data.type.pointerLevel) : '')) : data.type, value: this.formatValue(data.value) });
    }
    for (const [name, func] of this.functions) {
      table.push({ name, type: 'function', value: `(${func.params.map(p => p.paramType.baseType).join(', ')}) -> ${func.returnType.baseType}` });
    }
    return table;
  }

  formatValue(v) {
    if (Array.isArray(v)) {
      if (v.length <= 20) return '[' + v.slice(0, 20).join(', ') + (v.length > 20 ? '...' : '') + ']';
      return `Array(${v.length})`;
    }
    if (v && typeof v === 'object') return JSON.stringify(v);
    return String(v);
  }
}

// ============================================================
// UI CONTROLLER
// ============================================================
const editor = document.getElementById('code-editor');
const lineNumbers = document.getElementById('line-numbers');
const outputPanel = document.getElementById('output-panel');
const errorsPanel = document.getElementById('errors-panel');
const astPanel = document.getElementById('ast-panel');
const symbolsPanel = document.getElementById('symbols-panel');
const runBtn = document.getElementById('run-btn');
const clearBtn = document.getElementById('clear-btn');
const exampleSelect = document.getElementById('example-select');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const execTime = document.getElementById('exec-time');
const cursorPos = document.getElementById('cursor-pos');
const errorCount = document.getElementById('error-count');
const titleEl = document.getElementById('editor-title');

// Update line numbers
function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  lineNumbers.innerHTML = Array.from({ length: lines }, (_, i) => `<div>${i + 1}</div>`).join('');
}

// Sync scroll
editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = start + 4;
    updateLineNumbers();
  }
  // Ctrl+Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

editor.addEventListener('click', updateCursorPos);
editor.addEventListener('keyup', updateCursorPos);

function updateCursorPos() {
  const text = editor.value.substring(0, editor.selectionStart);
  const lines = text.split('\n');
  cursorPos.textContent = `Ln ${lines.length}, Col ${lines[lines.length - 1].length + 1}`;
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    [outputPanel, errorsPanel, astPanel, symbolsPanel].forEach(p => p.classList.add('hidden'));
    document.getElementById(`${btn.dataset.tab}-panel`).classList.remove('hidden');
  });
});

// Example loading
exampleSelect.addEventListener('change', () => {
  if (exampleSelect.value && EXAMPLES[exampleSelect.value]) {
    editor.value = EXAMPLES[exampleSelect.value];
    updateLineNumbers();
    exampleSelect.value = '';
    showToast('Example loaded', 'info');
  }
});

// Clear
clearBtn.addEventListener('click', () => {
  editor.value = '';
  updateLineNumbers();
  outputPanel.innerHTML = '<span style="color:#484f58;">// Click "Run" to compile and execute your C code</span>';
  errorsPanel.innerHTML = '';
  astPanel.innerHTML = '';
  symbolsPanel.innerHTML = '';
  statusDot.style.background = '#484f58';
  statusText.textContent = 'Ready';
  execTime.textContent = '';
  errorCount.style.display = 'none';
});

// Run code
function runCode() {
  const source = editor.value.trim();
  if (!source) { showToast('No code to compile', 'error'); return; }

  statusDot.style.background = '#d29922';
  statusText.textContent = 'Compiling...';
  runBtn.disabled = true;
  runBtn.style.opacity = '0.6';

  setTimeout(() => {
    const start = performance.now();
    const interpreter = new CInterpreter();
    let result;
    try {
      result = interpreter.compile(source);
    } catch (e) {
      result = { success: false, output: '', errors: [{ line: 0, message: e.message || String(e) }], warnings: [], ast: null, symbols: [] };
    }
    const elapsed = (performance.now() - start).toFixed(1);

    runBtn.disabled = false;
    runBtn.style.opacity = '1';
    execTime.textContent = `${elapsed}ms`;

    // Filter out exit errors
    result.errors = result.errors.filter(e => !e.isExit);

    // Output
    if (result.output) {
      outputPanel.innerHTML = `<pre style="white-space:pre-wrap; color:#e6edf3; margin:0;">${escapeHtml(result.output)}</pre>`;
    } else {
      outputPanel.innerHTML = '<span style="color:#484f58;">// No output generated</span>';
    }

    // Warnings in output
    if (result.warnings.length > 0) {
      outputPanel.innerHTML += '<div style="margin-top:12px; border-top:1px solid #30363d; padding-top:8px;">';
      for (const w of result.warnings) {
        outputPanel.innerHTML += `<div style="color:#d29922; font-size:12px;">⚠ ${escapeHtml(w.message)}</div>`;
      }
      outputPanel.innerHTML += '</div>';
    }

    // Errors
    if (result.errors.length > 0) {
      errorCount.textContent = result.errors.length;
      errorCount.style.display = 'inline';
      errorsPanel.innerHTML = result.errors.map(e =>
        `<div style="padding:8px 12px; margin-bottom:6px; border-radius:6px; background:#1c1210; border:1px solid #da363380;">
          <span style="color:#da3633; font-weight:600;">${e.line ? `Line ${e.line}: ` : ''}Error</span>
          <div style="color:#f0883e; margin-top:2px;">${escapeHtml(e.message)}</div>
        </div>`
      ).join('');
      statusDot.style.background = '#da3633';
      statusText.textContent = `${result.errors.length} error${result.errors.length > 1 ? 's' : ''}`;
    } else {
      errorCount.style.display = 'none';
      errorsPanel.innerHTML = '<span style="color:#3fb950;">✓ No errors</span>';
      statusDot.style.background = '#3fb950';
      statusText.textContent = 'Compiled successfully';
    }

    // AST
    if (result.ast) {
      astPanel.innerHTML = `<pre style="white-space:pre-wrap; color:#8b949e; font-size:12px; margin:0;">${escapeHtml(JSON.stringify(result.ast, null, 2).substring(0, 8000))}</pre>`;
    }

    // Symbols
    if (result.symbols && result.symbols.length > 0) {
      symbolsPanel.innerHTML = `
        <table style="width:100%; border-collapse:collapse;">
          <thead><tr style="border-bottom:1px solid #30363d;">
            <th style="text-align:left; padding:6px 12px; color:#58a6ff; font-size:12px;">Name</th>
            <th style="text-align:left; padding:6px 12px; color:#58a6ff; font-size:12px;">Type</th>
            <th style="text-align:left; padding:6px 12px; color:#58a6ff; font-size:12px;">Value</th>
          </tr></thead>
          <tbody>${result.symbols.map(s => `
            <tr style="border-bottom:1px solid #21262d;">
              <td style="padding:5px 12px; color:#e6edf3; font-size:12px;">${escapeHtml(s.name)}</td>
              <td style="padding:5px 12px; color:#d2a8ff; font-size:12px;">${escapeHtml(s.type)}</td>
              <td style="padding:5px 12px; color:#a5d6ff; font-size:12px;">${escapeHtml(s.value)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      symbolsPanel.innerHTML = '<span style="color:#484f58;">// No symbols</span>';
    }

    // Switch to output tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="output"]').classList.add('active');
    [outputPanel, errorsPanel, astPanel, symbolsPanel].forEach(p => p.classList.add('hidden'));
    outputPanel.classList.remove('hidden');
  }, 50);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  const bg = type === 'error' ? '#da3633' : type === 'info' ? '#1f6feb' : '#238636';
  toast.style.cssText = `background:${bg}; color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif;`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

runBtn.addEventListener('click', runCode);

// Init
updateLineNumbers();
lucide.createIcons();

  font_family: 'DM Sans',
  font_size: 14
};

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const text = config.text_color || defaultConfig.text_color;
  const primary = config.primary_action_color || defaultConfig.primary_action_color;
  const accent = config.secondary_action_color || defaultConfig.secondary_action_color;
  const keyword = config.keyword_color || defaultConfig.keyword_color;
  const operator = config.operator_color || defaultConfig.operator_color;
  const string = config.string_color || defaultConfig.string_color;
  const array = config.array_color || defaultConfig.array_color;
  const font = config.font_family || defaultConfig.font_family;
  const size = config.font_size || defaultConfig.font_size;

  document.body.style.background = bg;
  titleEl.textContent = config.editor_title || defaultConfig.editor_title;
  titleEl.style.color = text;
  titleEl.style.fontFamily = `${font}, DM Sans, sans-serif`;
  titleEl.style.fontSize = `${size}px`;

  document.querySelector('header').style.background = surface;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (!b.classList.contains('active')) b.style.color = text + '99';
  });

  runBtn.style.background = primary;
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) activeTab.style.color = accent;

  document.getElementById('status-text').style.fontFamily = `${font}, DM Sans, sans-serif`;
  document.getElementById('status-text').style.fontSize = `${size * 0.85}px`;

  // Update syntax colors
  const syntaxStyle = document.getElementById('syntax-colors');
  syntaxStyle.innerHTML = `.keyword { color: ${keyword} !important; } .operator { color: ${operator} !important; } .string { color: ${string} !important; } .array { color: ${array} !important; }`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['editor_title', config.editor_title || defaultConfig.editor_title],
    ['keyword_color', config.keyword_color || defaultConfig.keyword_color],
    ['operator_color', config.operator_color || defaultConfig.operator_color],
    ['string_color', config.string_color || defaultConfig.string_color],
    ['array_color', config.array_color || defaultConfig.array_color]
  ])
});
</script>
