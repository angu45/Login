<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Hub</title>
</head>
<body>

    <!-- Header Load -->
    <div id="header"></div>

    <!-- Main Content -->
    <main>
        <h1>Welcome to Interview Hub</h1>
        <p>This is homepage content.</p>
    </main>

    <!-- Footer Load -->
    <div id="footer"></div>

    <script>
        // Header Load
        fetch("https://interview-hub.in/Pages/Assets/header.html")
            .then(response => {
                if (!response.ok) throw new Error("Header not loaded");
                return response.text();
            })
            .then(data => {
                document.getElementById("header").innerHTML = data;
            })
            .catch(error => {
                console.error("Error loading header:", error);
            });

        // Footer Load
        fetch("https://interview-hub.in/Pages/Assets/footer.html")
            .then(response => {
                if (!response.ok) throw new Error("Footer not loaded");
                return response.text();
            })
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            })
            .catch(error => {
                console.error("Error loading footer:", error);
            });
    </script>

</body>
</html>
