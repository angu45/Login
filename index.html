<!DOCTYPE html>
<html lang="en">
<head>
</head>


<body>



<div id="craby-loader"
style="
position:fixed;
inset:0;
background:radial-gradient(circle at center, var(--bg-main), #000);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1);
">

<div style="text-align:center;width:250px;">

<img src="Logo.png"
style="
width:110px;
height:auto;
margin-bottom:20px;
filter:drop-shadow(0 0 20px var(--accent));
animation:premiumFloat 2s ease-in-out infinite;
">

<div style="
font-size:30px;
font-weight:900;
color:var(--accent);
font-family:'Plus Jakarta Sans',sans-serif;
margin-bottom:12px;
letter-spacing:2px;
transform:scale(1);
animation:pctPop 1s ease;
">
<span id="load-val">0</span>%
</div>

<div style="
width:100%;
height:8px;
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
">

<div id="bar-fill"
style="
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),#00eaff,var(--accent));
background-size:200% 100%;
box-shadow:0 0 20px var(--accent);
transition:width 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
">
</div>

</div>
</div>
</div>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TTVQBL6S"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
    </div>
    <div class="header-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download Project"><i class="fas fa-download"></i></button>
        <button id="run-btn" class="icon-btn run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
    </div>
</header>

<div id="shutter-trigger" onclick="toggleShutter()">
    <i class="fas fa-chevron-right"></i>
</div>

<main class="main-container">
    <div id="editor-grid" class="editor-grid"></div>
</main>

<div id="shutter" class="shutter">
    <div class="shutter-header">
        <h3 style="color: var(--accent);">TASKBAR</h3>
         <div id="taskbar-files"></div>
        <i class="fas fa-times" onclick="toggleShutter()" style="cursor: pointer; color: white;"></i>
    </div>
    <div class="shutter-list">
        <button class="add-btn" onclick="addNewFilePrompt()"><i class="fas fa-plus"></i> NEW FILE</button>
        <div id="shutter-file-list"></div>
    </div>
</div>

<div id="settingsPanel" class="settings-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="color: var(--accent);">IDE Settings</h3>
        <i class="fas fa-times" onclick="toggleSettings()" style="cursor: pointer; color: #ff4d4d;"></i>
    </div>

    <div class="s-group">
        <label>Show/Hide Editors</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="chk-html" checked onchange="updateVisibility()"> HTML</label>
            <label><input type="checkbox" id="chk-css" checked onchange="updateVisibility()"> CSS</label>
            <label><input type="checkbox" id="chk-js" checked onchange="updateVisibility()"> JS</label>
        </div>
    </div>

    <div class="s-group">
        <label>Font Family</label>
        <select id="font-family-sel" onchange="updateThemeAndFont()">
            <option value="'Fira Code', monospace">Fira Code</option>
            <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
            <option value="'Source Code Pro', monospace">Source Code Pro</option>
            <option value="'Roboto Mono', monospace">Roboto Mono</option>
            <option value="'Ubuntu Mono', monospace">Ubuntu Mono</option>
            <option value="'Courier New', monospace">Courier New</option>
        </select>
    </div>

    <div class="s-group">
        <label>Font Size: <span id="font-size-val">14px</span></label>
        <input type="range" id="font-size-range" min="5" max="50" value="14" oninput="updateFontSize(this.value)">
    </div>

    <div class="s-group">
        <label>Editor Theme</label>
        <select id="theme-sel" onchange="updateThemeAndFont()">
            <option value="dark">Github Dark</option>
            <option value="monokai">Monokai Pro</option>
            <option value="dracula">Dracula</option>
            <option value="cyberpunk">Cyberpunk Neon</option>
            <option value="matrix">Matrix Green</option>
            <option value="nord">Nordic Blue</option>
            <option value="midnight">Midnight Deep</option>
            <option value="solarized">Solarized Dark</option>
            <option value="oceanic">Oceanic Blue</option>
            <option value="evergreen">Evergreen Forest</option>
            <option value="midnight_purple">Midnight Purple</option>
            <option value="light">Simple Light</option>
        </select>
    </div>

    <button class="add-btn" onclick="toggleSettings()" style="margin-top: 10px;">SAVE & CLOSE</button>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Logo" height="30">
        </div>
    <div style="display: flex; gap: 10px;">
    <button class="icon-btn" onclick="refreshPreview()"><i class="fas fa-sync-alt"></i></button>
    
    <button class="icon-btn" onclick="setPreviewSize('100%')"><i class="fas fa-desktop"></i></button>
    <button class="icon-btn" onclick="setPreviewSize('375px')"><i class="fas fa-mobile-alt"></i></button>
    <button onclick="closePreview()" class="icon-btn">CLOSE</button>
</div>
  </div>
    <div id="preview-body" style="flex:1; display:flex; justify-content:center; align-items:center; background:#1e1e1e;">
        <iframe id="output-frame" style="width:100%; height:100%; background:white; transition: 0.3s ease;"></iframe>
    </div>
</div>
<script src="script2.js"></script>
</body>
</html>
