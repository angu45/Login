<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craby Code Studio - Professional Web IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-panel: #161b22;
            --bg-header: #010409;
            --accent: #ffb400;
            --accent-hover: #ffcc33;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --window-header-bg: #21262d;
            --glass-bg: rgba(22, 27, 34, 0.85);
            --glass-border: rgba(255, 180, 0, 0.3);
            
            /* Syntax Highlighting Colors - Professional */
            --syntax-tag: #ff7b72;
            --syntax-tag-glow: rgba(255, 123, 114, 0.4);
            --syntax-attr: #79c0ff;
            --syntax-attr-glow: rgba(121, 192, 255, 0.4);
            --syntax-value: #a5d6ff;
            --syntax-value-glow: rgba(165, 214, 255, 0.4);
            --syntax-property: #d2a8ff;
            --syntax-property-glow: rgba(210, 168, 255, 0.5);
            --syntax-keyword: #ff3370;
            --syntax-keyword-glow: rgba(255, 51, 112, 0.5);
            --syntax-string: #3fb950;
            --syntax-string-glow: rgba(63, 185, 80, 0.4);
            --syntax-number: #f0883e;
            --syntax-number-glow: rgba(240, 136, 62, 0.5);
            --syntax-comment: #8b949e;
            --syntax-selector: #ffa657;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- AUTHENTICATION MODAL --- */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(10px);
        }

        .auth-container {
            background: var(--bg-panel);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(255, 180, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), #00eaff, var(--accent));
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; }
        .auth-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #ff9500);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 180, 0, 0.4);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            cursor: pointer;
        }

        /* --- HEADER --- */
        header {
            height: 60px;
            background: var(--bg-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 3000;
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .logo-container img { height: 35px; width: auto; }
        .logo-text { 
            color: var(--accent); 
            font-weight: 800; 
            font-size: 1.2rem; 
            letter-spacing: 1px;
        }

        .header-actions { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff9500);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .icon-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn:hover { 
            background: #1c2128; 
            border-color: var(--accent); 
            transform: translateY(-1px);
        }

        .run-btn {
            background: rgba(255, 180, 0, 0.15) !important;
            border: 1px solid var(--accent) !important;
            color: var(--accent) !important;
            font-weight: 800;
        }

        .run-btn:hover { 
            background: var(--accent) !important; 
            color: #000 !important;
        }

        /* --- MAIN LAYOUT --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 10px;
        }

        .editor-grid {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }

        /* --- WINDOW FRAMES --- */
        .window-frame {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 40px;
            overflow: hidden;
            transition: flex 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .window-frame.fullscreen {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            z-index: 500;
            border-radius: 0;
        }

        .window-header {
            background: var(--window-header-bg);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .window-title { 
            font-size: 12px; 
            font-weight: 800; 
            color: var(--accent); 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls { 
            display: flex; 
            gap: 12px; 
        }
        .window-controls i { 
            cursor: pointer; 
            font-size: 14px; 
            color: var(--text-secondary); 
            transition: 0.2s; 
        }
        .window-controls i:hover { 
            color: var(--accent); 
            transform: scale(1.1); 
        }

        /* --- EDITOR WITH SYNTAX HIGHLIGHTING --- */
        .editor-container {
            flex: 1;
            display: flex;
            position: relative;
            background: rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            pointer-events: none;
            white-space: pre;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: hidden;
            z-index: 1;
            color: transparent;
        }

        .input-layer {
            position: relative;
            z-index: 2;
            flex: 1;
            width: 100%;
            background: transparent !important;
            color: transparent !important;
            caret-color: var(--accent);
            border: none;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
        }

        /* Syntax Highlighting Tokens */
        .token-tag { color: var(--syntax-tag); text-shadow: 0 0 8px var(--syntax-tag-glow); font-weight: bold; }
        .token-attr { color: var(--syntax-attr); text-shadow: 0 0 6px var(--syntax-attr-glow); }
        .token-value { color: var(--syntax-value); text-shadow: 0 0 6px var(--syntax-value-glow); }
        .token-property { color: var(--syntax-property); text-shadow: 0 0 8px var(--syntax-property-glow); }
        .token-keyword { color: var(--syntax-keyword); text-shadow: 0 0 8px var(--syntax-keyword-glow); font-weight: bold; }
        .token-string { color: var(--syntax-string); text-shadow: 0 0 6px var(--syntax-string-glow); }
        .token-number { color: var(--syntax-number); text-shadow: 0 0 6px var(--syntax-number-glow); }
        .token-comment { color: var(--syntax-comment); font-style: italic; }
        .token-selector { color: var(--syntax-selector); font-weight: bold; }

        /* --- SHUTTER (LEFT SIDEBAR) --- */
        .shutter {
            position: fixed;
            left: -320px;
            top: 0;
            width: 300px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4000;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .shutter.open { left: 0; }

        .shutter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
        }

        .shutter-header h3 { color: var(--accent); font-size: 1.2rem; }

        .shutter-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(255,180,0,0.1);
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .file-item.active {
            background: rgba(255,180,0,0.2);
            border-color: var(--accent);
        }

        .file-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .file-icon { color: var(--accent); }
        .file-name { 
            color: var(--text-primary); 
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .file-item:hover .file-actions { opacity: 1; }
        .file-actions i {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
        }
        .file-actions i:hover { color: var(--accent); }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), #ff9500);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .add-btn:hover { transform: translateY(-2px); }

        /* --- SETTINGS PANEL --- */
        .settings-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 320px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--glass-border);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4000;
            padding: 25px;
            overflow-y: auto;
        }

        .settings-panel.open { right: 0; }

        .setting-group { margin-bottom: 25px; }
        .setting-label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .setting-control {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            outline: none;
        }

        /* --- PREVIEW OVERLAY --- */
        .preview-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .preview-controls {
            height: 60px;
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }

        /* --- AUTOCOMPLETE DROPDOWN --- */
        .autocomplete-container {
            position: absolute;
            background: var(--bg-panel);
            border: 1px solid var(--accent);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            margin-top: 5px;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .autocomplete-item:hover, .autocomplete-item.selected {
            background: rgba(255,180,0,0.2);
        }
        .autocomplete-item .icon { color: var(--accent); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: var(--accent); 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

        /* Responsive */
        @media (max-width: 768px) {
            .shutter { width: 280px; left: -280px; }
            .settings-panel { width: 280px; right: -280px; }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION MODAL -->
    <div id="authModal" class="auth-overlay">
        <div class="auth-container">
            <div class="auth-header">
                <h1><i class="fas fa-code"></i> Craby Studio</h1>
                <p>Professional Web Development Environment</p>
            </div>
            
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary" id="authBtn">LOGIN</button>
            </form>
            
            <div class="auth-switch">
                <span id="switchText">Don't have an account?</span>
                <a onclick="toggleAuthMode()" id="switchLink">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
            <span class="logo-text">CRABY STUDIO</span>
        </div>
        
        <div class="header-actions">
            <button class="icon-btn" onclick="beautifyCode()" title="Format Code">
                <i class="fas fa-magic"></i> Format
            </button>
            <button class="icon-btn" onclick="exportCode()" title="Export">
                <i class="fas fa-download"></i> Export
            </button>
            <button class="icon-btn run-btn" onclick="runCode()">
                <i class="fas fa-play"></i> RUN
            </button>
            <button class="icon-btn" onclick="toggleSettings()" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
            
            <div class="user-profile" id="userProfile" style="display:none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <span id="userName">User</span>
                <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer; margin-left:10px; color: var(--accent);"></i>
            </div>
        </div>
    </header>

    <!-- LEFT SIDEBAR (SHUTTER) -->
    <div id="shutter" class="shutter">
        <div class="shutter-header">
            <h3><i class="fas fa-folder-open"></i> EXPLORER</h3>
            <i class="fas fa-times" onclick="toggleShutter()" style="cursor:pointer; color: var(--text-secondary);"></i>
        </div>
        <div class="shutter-list">
            <button class="add-btn" onclick="createNewFile()">
                <i class="fas fa-plus"></i> NEW FILE
            </button>
            <div id="fileList"></div>
        </div>
    </div>

    <!-- MAIN EDITOR -->
    <div id="shutter-trigger" onclick="toggleShutter()">
        <i class="fas fa-chevron-right"></i>
    </div>

    <main class="main-container">
        <div id="editor-grid" class="editor-grid"></div>
    </main>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="settings-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="color:var(--accent);">SETTINGS</h3>
            <i class="fas fa-times" onclick="toggleSettings()" style="cursor:pointer;"></i>
        </div>

        <div class="setting-group">
            <label class="setting-label">Editor Theme</label>
            <select class="setting-control" id="themeSelect" onchange="applyTheme()">
                <option value="github">GitHub Dark</option>
                <option value="dracula">Dracula</option>
                <option value="monokai">Monokai</option>
                <option value="nord">Nord</option>
                <option value="cyberpunk">Cyberpunk</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Font Family</label>
            <select class="setting-control" id="fontSelect" onchange="applyFont()">
                <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                <option value="'Fira Code', monospace">Fira Code</option>
                <option value="'Source Code Pro', monospace">Source Code Pro</option>
                <option value="'Consolas', monospace">Consolas</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Font Size: <span id="fontSizeVal">14</span>px</label>
            <input type="range" min="10" max="24" value="14" class="setting-control" oninput="updateFontSize(this.value)">
        </div>

        <div class="setting-group">
            <label class="setting-label">Word Wrap</label>
            <input type="checkbox" id="wordWrap" class="setting-control" style="width:auto;" onchange="toggleWordWrap()">
        </div>
    </div>

    <!-- PREVIEW OVERLAY -->
    <div id="previewOverlay" class="preview-overlay">
        <div class="preview-controls">
            <div class="logo-container">
                <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" height="30">
                <span style="margin-left:10px; color:var(--accent);">PREVIEW</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="icon-btn" onclick="refreshPreview()"><i class="fas fa-sync"></i></button>
                <button class="icon-btn" onclick="changePreviewSize('100%')"><i class="fas fa-desktop"></i></button>
                <button class="icon-btn" onclick="changePreviewSize('375px')"><i class="fas fa-mobile"></i></button>
                <button class="icon-btn" onclick="closePreview()"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <iframe id="previewFrame" style="flex:1; border:none; width:100%; background:white;"></iframe>
    </div>

    <script>
        // --- AUTHENTICATION SYSTEM ---
        let currentUser = null;
        let authMode = 'login';

        function checkAuth() {
            const user = localStorage.getItem('craby_user');
            const pass = localStorage.getItem('craby_pass');
            if (user && pass) {
                currentUser = user;
                showApp();
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        }

        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'register' : 'login';
            const btn = document.getElementById('authBtn');
            const link = document.getElementById('switchLink');
            const text = document.getElementById('switchText');
            const passGroup = document.getElementById('passwordGroup');
            
            if (authMode === 'register') {
                btn.textContent = 'CREATE ACCOUNT';
                link.textContent = 'Login';
                text.textContent = 'Already have an account?';
            } else {
                btn.textContent = 'LOGIN';
                link.textContent = 'Sign Up';
                text.textContent = "Don't have an account?";
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (authMode === 'register') {
                if (localStorage.getItem('craby_user') === username) {
                    alert('User already exists!');
                    return;
                }
                localStorage.setItem('craby_user', username);
                localStorage.setItem('craby_pass', password);
                alert('Account created successfully!');
            } else {
                if (localStorage.getItem('craby_user') === username && 
                    localStorage.getItem('craby_pass') === password) {
                    currentUser = username;
                } else {
                    alert('Invalid credentials!');
                    return;
                }
            }
            
            document.getElementById('authModal').style.display = 'none';
            showApp();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('craby_user');
            localStorage.removeItem('craby_pass');
            location.reload();
        }

        function showApp() {
            document.getElementById('userProfile').style.display = 'flex';
            document.getElementById('userName').textContent = currentUser;
            document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
            initEditor();
        }

        // --- EDITOR SYSTEM ---
        let files = {
            'index.html': { content: '<!DOCTYPE html>\n<html>\n<head>\n  <title>My App</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Hello World</h1>\n  <script src="app.js"><\/script>\n</body>\n</html>', type: 'html' },
            'style.css': { content: 'body {\n  margin: 0;\n  padding: 20px;\n  font-family: sans-serif;\n  background: #f0f0f0;\n}\nh1 {\n  color: #ffb400;\n  text-align: center;\n}', type: 'css' },
            'app.js': { content: 'console.log("Hello from Craby Studio");\ndocument.addEventListener("DOMContentLoaded", () => {\n  console.log("App loaded");\n});', type: 'js' }
        };

        let activeFile = null;
        let openFiles = new Set();

        // Syntax Highlighting Rules
        const syntaxRules = {
            html: [
                { regex: /(&lt;\/?)(\w+)(.*?)(&gt;)/g, groups: ['tag', 'tag', 'attr'] },
                { regex: /(\w+)=["']([^"']*)["']/g, groups: ['attr', 'value'] },
                { regex: /(&lt;\/?)(\w+)/g, groups: ['tag', 'tag'] }
            ],
            css: [
                { regex: /([^{]+)\{([^}]+)\}/g, groups: ['selector', 'property'] },
                { regex: /([a-zA-Z-]+)\s*:\s*([^;]+);/g, groups: ['property', 'value'] },
                { regex: /([\d.]+)(px|em|%|rem|s|ms|deg)/g, groups: ['number', 'value'] }
            ],
            js: [
                { regex: /\b(const|let|var|function|if|else|for|while|return|class|import|export|from)\b/g, groups: ['keyword'] },
                { regex: /(['"`])(.*?)\1/g, groups: ['string', 'string'] },
                { regex: /\b(\d+)\b/g, groups: ['number'] },
                { regex: /\/\/.*/g, groups: ['comment'] }
            ]
        };

        function initEditor() {
            updateFileList();
            // Open default files
            setTimeout(() => {
                openFile('index.html');
                openFile('style.css');
            }, 100);
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            Object.keys(files).forEach(filename => {
                const item = document.createElement('div');
                item.className = 'file-item';
                if (filename === activeFile) item.classList.add('active');
                
                const ext = filename.split('.').pop();
                const icon = ext === 'html' ? 'fab fa-html5' : 
                            ext === 'css' ? 'fab fa-css3-alt' : 
                            ext === 'js' ? 'fab fa-js' : 'fas fa-file-code';
                
                item.innerHTML = `
                    <div class="file-info">
                        <i class="${icon} file-icon"></i>
                        <span class="file-name">${filename}</span>
                    </div>
                    <div class="file-actions">
                        <i class="fas fa-times" onclick="closeFile('${filename}', event)" title="Close"></i>
                    </div>
                `;
                
                item.onclick = (e) => {
                    if (!e.target.classList.contains('fa-times')) {
                        openFile(filename);
                    }
                };
                
                list.appendChild(item);
            });
        }

        function openFile(filename) {
            if (openFiles.has(filename)) {
                activateFile(filename);
                return;
            }
            
            openFiles.add(filename);
            activeFile = filename;
            
            const grid = document.getElementById('editor-grid');
            const id = 'editor-' + filename.replace(/[^a-z0-9]/gi, '-');
            
            const file = files[filename];
            const ext = filename.split('.').pop();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'window-frame';
            wrapper.id = `box-${id}`;
            wrapper.innerHTML = `
                <div class="window-header">
                    <span class="window-title">
                        <i class="${getFileIcon(ext)}"></i> ${filename}
                    </span>
                    <div class="window-controls">
                        <i class="fas fa-minus" onclick="minimizeWindow('${id}')"></i>
                        <i class="fas fa-expand" onclick="toggleFullscreen('${id}')"></i>
                        <i class="fas fa-trash" onclick="deleteFile('${filename}')"></i>
                    </div>
                </div>
                <div class="editor-container" id="container-${id}">
                    <textarea class="input-layer" id="${id}" spellcheck="false" 
                        oninput="updateContent('${filename}', this.value); highlightSyntax('${filename}', this.value)"
                        onscroll="syncScroll('${id}')"
                        onkeydown="handleKeydown(event, '${filename}')">${file.content}</textarea>
                    <div class="autocomplete-container" id="autocomplete-${id}"></div>
                </div>
            `;
            
            grid.appendChild(wrapper);
            const textarea = document.getElementById(id);
            
            // Initialize syntax highlighting
            setTimeout(() => highlightSyntax(filename, file.content), 100);
            updateFileList();
        }

        function getFileIcon(ext) {
            const icons = {
                html: 'fab fa-html5',
                css: 'fab fa-css3-alt',
                js: 'fab fa-js',
                json: 'fas fa-code',
                txt: 'fas fa-file-alt'
            };
            return icons[ext] || 'fas fa-file-code';
        }

        function highlightSyntax(filename, content) {
            const ext = filename.split('.').pop();
            const rules = syntaxRules[ext] || [];
            
            // Simple highlighting implementation
            let html = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Apply syntax rules
            rules.forEach(rule => {
                html = html.replace(rule.regex, (match, ...groups) => {
                    let result = match;
                    rule.groups.forEach((group, i) => {
                        if (groups[i] && group) {
                            result = result.replace(groups[i], `<span class="token-${group}">${groups[i]}</span>`);
                        }
                    });
                    return result;
                });
            });
            
            // This is a simplified version - in production, use a proper parser
        }

        function updateContent(filename, content) {
            files[filename].content = content;
            if (filename === activeFile) {
                highlightSyntax(filename, content);
            }
        }

        function closeFile(filename, event) {
            event.stopPropagation();
            openFiles.delete(filename);
            const id = 'editor-' + filename.replace(/[^a-z0-9]/gi, '-');
            const box = document.getElementById(`box-${id}`);
            if (box) box.remove();
            
            if (activeFile === filename) {
                activeFile = openFiles.size > 0 ? Array.from(openFiles)[openFiles.size - 1] : null;
            }
            updateFileList();
        }

        function activateFile(filename) {
            activeFile = filename;
            updateFileList();
            // Focus the textarea
            const id = 'editor-' + filename.replace(/[^a-z0-9]/gi, '-');
            const textarea = document.getElementById(id);
            if (textarea) textarea.focus();
        }

        function createNewFile() {
            const name = prompt('Enter file name (e.g., script.js):');
            if (!name) return;
            
            if (files[name]) {
                if (confirm('File exists. Overwrite?')) {
                    openFile(name);
                    return;
                }
                return;
            }
            
            const ext = name.split('.').pop();
            const type = ['html','css','js'].includes(ext) ? ext : 'text';
            files[name] = { content: '', type: type };
            openFile(name);
        }

        function deleteFile(filename) {
            if (confirm(`Delete ${filename}?`)) {
                delete files[filename];
                closeFile(filename, { stopPropagation: () => {} });
            }
        }

        // --- RUN & PREVIEW ---
        function runCode() {
            const htmlFiles = Object.keys(files).filter(f => f.endsWith('.html'));
            if (htmlFiles.length === 0) {
                alert('No HTML file found!');
                return;
            }
            
            const mainFile = htmlFiles[0];
            const overlay = document.getElementById('previewOverlay');
            const frame = document.getElementById('previewFrame');
            
            let css = '';
            let js = '';
            
            Object.keys(files).forEach(f => {
                if (f.endsWith('.css')) css += files[f].content;
                if (f.endsWith('.js')) js += files[f].content;
            });
            
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>${css}</style>
                </head>
                <body>
                    ${files[mainFile].content}
                    <script>${js}<\/script>
                </body>
                </html>
            `;
            
            frame.srcdoc = html;
            overlay.style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewOverlay').style.display = 'none';
        }

        function changePreviewSize(size) {
            document.getElementById('previewFrame').style.width = size;
        }

        function refreshPreview() {
            const frame = document.getElementById('previewFrame');
            frame.src = frame.src;
        }

        // --- CODE FORMATTING ---
        function beautifyCode() {
            if (!activeFile) return;
            
            const content = files[activeFile].content;
            const ext = activeFile.split('.').pop();
            let formatted = content;
            
            if (ext === 'html') {
                formatted = formatHTML(content);
            } else if (ext === 'css') {
                formatted = formatCSS(content);
            } else if (ext === 'js') {
                formatted = formatJS(content);
            }
            
            files[activeFile].content = formatted;
            const id = 'editor-' + activeFile.replace(/[^a-z0-9]/gi, '-');
            const textarea = document.getElementById(id);
            if (textarea) {
                textarea.value = formatted;
                highlightSyntax(activeFile, formatted);
            }
        }

        function formatHTML(html) {
            let indent = 0;
            return html
                .replace(/>\s*</g, '><')
                .replace(/</g, '\n<')
                .split('\n')
                .map(line => {
                    line = line.trim();
                    if (line.match(/^<\/.+/)) indent--;
                    let result = '  '.repeat(indent) + line;
                    if (line.match(/^<[^!\/].*[^\/]>$/)) indent++;
                    return result;
                })
                .join('\n');
        }

        function formatCSS(css) {
            return css
                .replace(/\s*{\s*/g, ' {\n  ')
                .replace(/;\s*/g, ';\n  ')
                .replace(/\s*}\s*/g, '\n}\n')
                .replace(/\s*:\s*/g, ': ')
                .split('\n')
                .map(line => line.trim() ? line : '')
                .join('\n');
        }

        function formatJS(js) {
            return js
                .replace(/{\s*/g, ' {\n  ')
                .replace(/}\s*/g, '\n}\n')
                .replace(/;\s*/g, ';\n')
                .replace(/(if|for|while|function)\s*\(/g, '$1 (')
                .split('\n')
                .map(line => line.trim() ? line : '')
                .join('\n');
        }

        // --- SETTINGS ---
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function applyTheme() {
            const theme = document.getElementById('themeSelect').value;
            const themes = {
                github: { bg: '#0d1117', panel: '#161b22', accent: '#ffb400', text: '#c9d1d9' },
                dracula: { bg: '#282a36', panel: '#44475a', accent: '#bd93f9', text: '#f8f8f2' },
                monokai: { bg: '#272822', panel: '#3e3d32', accent: '#f92672', text: '#f8f8f2' },
                nord: { bg: '#2e3440', panel: '#3b4252', accent: '#88c0d0', text: '#d8dee9' },
                cyberpunk: { bg: '#0b0e14', panel: '#1a1f29', accent: '#00ff41', text: '#f3f3f3' }
            };
            
            const t = themes[theme];
            document.documentElement.style.setProperty('--bg-main', t.bg);
            document.documentElement.style.setProperty('--bg-panel', t.panel);
            document.documentElement.style.setProperty('--accent', t.accent);
            document.documentElement.style.setProperty('--text-primary', t.text);
        }

        function applyFont() {
            const font = document.getElementById('fontSelect').value;
            document.querySelectorAll('.input-layer').forEach(el => {
                el.style.fontFamily = font;
            });
        }

        function updateFontSize(val) {
            document.getElementById('fontSizeVal').textContent = val;
            document.querySelectorAll('.input-layer').forEach(el => {
                el.style.fontSize = val + 'px';
            });
        }

        function toggleWordWrap() {
            const wrap = document.getElementById('wordWrap').checked;
            document.querySelectorAll('.input-layer').forEach(el => {
                el.style.whiteSpace = wrap ? 'pre-wrap' : 'pre';
            });
        }

        // --- UTILITIES ---
        function toggleShutter() {
            document.getElementById('shutter').classList.toggle('open');
            const icon = document.querySelector('#shutter-trigger i');
            icon.className = document.getElementById('shutter').classList.contains('open') ? 
                'fas fa-chevron-left' : 'fas fa-chevron-right';
        }

        function minimizeWindow(id) {
            document.getElementById(`box-${id}`).style.display = 'none';
        }

        function toggleFullscreen(id) {
            document.getElementById(`box-${id}`).classList.toggle('fullscreen');
        }

        function syncScroll(id) {
            // Sync line numbers if implemented
        }

        function handleKeydown(e, filename) {
            if (e.key === 's' && e.ctrlKey) {
                e.preventDefault();
                localStorage.setItem('craby_projects', JSON.stringify(files));
                alert('Project saved!');
            }
            
            // Autocomplete trigger
            if (e.key === 'Tab' && e.ctrlKey) {
                e.preventDefault();
                showAutocomplete(filename);
            }
        }

        function showAutocomplete(filename) {
            // Implementation for autocomplete
            console.log('Autocomplete triggered for', filename);
        }

        function exportCode() {
            if (!activeFile) return;
            const content = files[activeFile].content;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFile;
            a.click();
        }

        // --- INIT ---
        window.onload = checkAuth;
    </script>
</body>
</html>
