<!DOCTYPE html>
<html lang="en">  
<head>  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>  
        /* --- 1. CORE LAYOUT --- */  
        :root {  
            --bg-main: #0d1117;  
            --bg-panel: #161b22;  
            --bg-header: #010409;  
            --accent: #ffb400;  
            --text-primary: #c9d1d9;  
            --border: rgba(255, 255, 255, 0.1);  
            --window-header-bg: #21262d;  
        }  
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {  
            background: var(--bg-main);  
            color: var(--text-primary);  
            font-family: 'Plus Jakarta Sans', sans-serif;  
            height: 100vh;  
            display: flex;  
            flex-direction: column;  
            overflow: hidden;  
        }  

        /* --- 2. HEADER: MOBILE FRIENDLY --- */  
        header {  
            height: auto;  
            min-height: 60px;  
            background: var(--bg-header);  
            display: flex;  
            flex-wrap: wrap;
            justify-content: space-between;  
            align-items: center;  
            padding: 5px 15px;  
            border-bottom: 2px solid var(--accent);  
            position: sticky;  
            top: 0;  
            z-index: 3000;  
        }  

        .logo-container img { height: 30px; width: auto; }  

        .header-actions {  
            display: flex;  
            gap: 5px;  
            align-items: center;  
            flex-wrap: wrap;
            padding: 5px 0;
        }  

        .icon-btn {  
            background: var(--bg-panel);  
            border: 1px solid var(--border);  
            color: white;  
            padding: 6px 10px;  
            border-radius: 6px;  
            cursor: pointer;  
            font-size: 12px;  
            transition: 0.2s;  
            display: flex;  
            align-items: center;  
            gap: 5px;  
        }  

        .run-btn {  
            background: rgba(255, 180, 0, 0.1) !important;  
            border: 1px solid var(--accent) !important;  
            color: var(--accent) !important;  
            font-weight: 800;  
        }  

        /* --- 3. MAIN CONTENT --- */  
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }  
        .editor-grid { display: flex; flex-direction: column; height: 100%; gap: 10px; overflow-y: auto; }  

        .window-frame {  
            background: var(--bg-panel);  
            border: 1px solid var(--border);  
            border-radius: 8px;  
            display: flex;  
            flex-direction: column;  
            min-height: 250px;  
            overflow: hidden;  
        }  

        .window-header {  
            background: var(--window-header-bg);  
            padding: 8px 15px;  
            display: flex;  
            justify-content: space-between;  
            border-bottom: 1px solid var(--border);  
        }  

        .window-title { font-size: 10px; font-weight: 800; color: var(--accent); }  

        /* --- EDITOR TEXTAREA & HIGHLIGHT --- */  
        .editor-container { position: relative; flex: 1; }  
        
        .highlight-layer, textarea {  
            position: absolute;  
            top: 0; left: 0; width: 100%; height: 100%;  
            padding: 12px; font-family: 'Fira Code', monospace;  
            font-size: 14px; line-height: 1.5; border: none; outline: none;  
            white-space: pre-wrap; word-wrap: break-word;  
        }  

        textarea { background: transparent; color: transparent; caret-color: var(--accent); z-index: 2; resize: none; }  
        .highlight-layer { z-index: 1; color: var(--text-primary); pointer-events: none; overflow: hidden; }  

        /* Syntax Glow */
        .tag { color: #ff7b72; text-shadow: 0 0 5px rgba(255,123,114,0.5); }
        .keyword { color: #d2a8ff; font-weight: bold; }
        .attr { color: #79c0ff; }
        .string { color: #a5d6ff; }

        /* --- MODALS --- */  
        .modal {  
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);  
            display: none; justify-content: center; align-items: center; z-index: 6000; padding: 20px;
        }  
        .modal-content {  
            background: var(--bg-panel); padding: 25px; border-radius: 12px;  
            width: 100%; max-width: 350px; border: 1px solid var(--accent);  
        }  
        .modal-content input {  
            width: 100%; padding: 12px; margin-bottom: 15px;  
            background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px;  
        }  
        .modal-content button {  
            width: 100%; padding: 12px; background: var(--accent); border: none;  
            font-weight: bold; border-radius: 6px; cursor: pointer;  
        }

        .error-msg { color: #ff4d4d; font-size: 13px; margin-bottom: 10px; display: none; text-align: center;}

        /* --- SHUTTER & PANELS --- */
        .shutter, .settings-panel {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(10px);
            z-index: 4000; transition: 0.3s; padding: 20px;
        }
        .shutter { left: -280px; border-right: 1px solid var(--accent); }
        .settings-panel { right: -280px; border-left: 1px solid var(--accent); }
        .shutter.open { left: 0; }
        .settings-panel.open { right: 0; }

        /* Preview Overlay */
        .preview-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }

        @media (max-width: 600px) {
            .header-actions { justify-content: center; width: 100%; }
            .icon-btn span { display: none; } /* Hide text on very small screens */
            .icon-btn { padding: 8px; }
        }
    </style>
</head>  
<body>  

    <header>  
        <div class="logo-container">  
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">  
        </div>  
        <div class="header-actions">  
            <button class="icon-btn" onclick="beautifyCode()"><i class="fas fa-magic"></i></button>  
            <button class="icon-btn" onclick="runCode()" class="run-btn" style="color:var(--accent)"><i class="fas fa-play"></i> <b>RUN</b></button>  
            <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i></button>  
            <button class="icon-btn" id="login-nav-btn" onclick="showLoginModal()"><i class="fas fa-sign-in-alt"></i> <span>Login</span></button>  
            <span id="user-profile" style="display:none; font-size: 12px; color: var(--accent);"></span>
            <button class="icon-btn" id="logout-btn" onclick="logout()" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
        </div>  
    </header>  

    <div id="shutter-trigger" style="position:fixed; left:0; top:50%; background:var(--accent); padding:10px; border-radius:0 5px 5px 0; z-index:2000; cursor:pointer;" onclick="toggleShutter()">
        <i class="fas fa-folder"></i>
    </div>

    <main class="main-container">  
        <div id="editor-grid" class="editor-grid"></div>  
    </main>  

    <div id="shutter" class="shutter">
        <h3 style="color:var(--accent)">FILES</h3><br>
        <button onclick="addNewFilePrompt()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:5px; font-weight:bold;">+ NEW FILE</button>
        <div id="shutter-file-list" style="margin-top:20px;"></div>
        <button onclick="toggleShutter()" style="margin-top:20px; background:none; border:1px solid gray; color:white; width:100%; padding:5px;">CLOSE</button>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <h3 style="color:var(--accent)">SETTINGS</h3><br>
        <label style="font-size:12px;">THEME</label>
        <select id="theme-sel" onchange="updateThemeAndFont()" style="width:100%; padding:10px; background:#000; color:white; margin-bottom:20px;">
            <option value="dark">Github Dark</option>
            <option value="dracula">Dracula</option>
            <option value="cyberpunk">Cyberpunk</option>
        </select>
        <button onclick="toggleSettings()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:5px;">SAVE</button>
    </div>

    <div id="preview-overlay" class="preview-overlay">
        <div style="background:#161b22; padding:10px; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:white">Preview</span>
            <button onclick="closePreview()" style="padding:5px 15px; background:red; color:white; border:none; border-radius:4px;">CLOSE</button>
        </div>
        <iframe id="output-frame" style="flex:1; border:none; background:white;"></iframe>
    </div>

    <div id="login-modal" class="modal">  
        <div class="modal-content">  
            <h2>Login</h2><br>  
            <div class="error-msg" id="login-error"></div>  
            <input type="email" id="login-email" placeholder="Email">  
            <input type="password" id="login-password" placeholder="Password">  
            <button id="login-submit-btn" onclick="handleLogin()">Login</button>  
            <p style="margin-top:15px; font-size:13px; text-align:center;">New here? <a onclick="showSignupModal()" style="color:var(--accent); cursor:pointer;">Sign Up</a></p>  
        </div>  
    </div>  

    <div id="signup-modal" class="modal">  
        <div class="modal-content">  
            <h2>Sign Up</h2><br>  
            <div class="error-msg" id="signup-error"></div>  
            <input type="email" id="signup-email" placeholder="Email">  
            <input type="password" id="signup-password" placeholder="Password">  
            <input type="password" id="signup-confirm" placeholder="Confirm Password">  
            <button id="signup-submit-btn" onclick="handleSignup()">Create Account</button>  
            <p style="margin-top:15px; font-size:13px; text-align:center;">Have account? <a onclick="showLoginModal()" style="color:var(--accent); cursor:pointer;">Login</a></p>  
        </div>  
    </div>  

    <script>  
        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyD7cnT-WH73-oURWAWK2NYfAvOLZavYwaaJQ5tL7GyFo0sMeOCrclLtOBuBQ5tRrE/exec';  

        let files = {
            "index.html": { content: "<h1>Hello Craby!</h1>", type: "html" },
            "style.css": { content: "h1 { color: orange; }", type: "css" }
        };

        // --- AUTH LOGIC (FIXED) ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-submit-btn');
            const errorDiv = document.getElementById('login-error');

            if(!email || !password) return alert("Fill all fields");

            btn.innerText = "Checking...";
            errorDiv.style.display = "none";

            try {
                // Using No-Cors or proper JSON structure for Apps Script
                const resp = await fetch(SHEETS_API_URL + `?action=login&email=${email}&password=${password}`);
                const data = await resp.json();

                if(data.status === 'success') {
                    localStorage.setItem('craby_user', JSON.stringify({email: data.email}));
                    location.reload();
                } else {
                    errorDiv.innerText = "Invalid Email or Password";
                    errorDiv.style.display = "block";
                }
            } catch(e) {
                errorDiv.innerText = "Connection Error";
                errorDiv.style.display = "block";
            } finally {
                btn.innerText = "Login";
            }
        }

        async function handleSignup() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorDiv = document.getElementById('signup-error');

            if(password !== confirm) {
                errorDiv.innerText = "Passwords don't match";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const resp = await fetch(SHEETS_API_URL + `?action=signup&email=${email}&password=${password}`);
                const data = await resp.json();
                if(data.status === 'success') {
                    alert("Signup Success! Please Login.");
                    showLoginModal();
                } else {
                    errorDiv.innerText = data.message || "Signup Failed";
                    errorDiv.style.display = "block";
                }
            } catch(e) {
                errorDiv.innerText = "Error connecting to server";
                errorDiv.style.display = "block";
            }
        }

        function logout() {
            localStorage.removeItem('craby_user');
            location.reload();
        }

        // --- UI FUNCTIONS ---
        function toggleShutter() { document.getElementById('shutter').classList.toggle('open'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function showLoginModal() { 
            document.getElementById('login-modal').style.display='flex'; 
            document.getElementById('signup-modal').style.display='none';
        }
        function showSignupModal() { 
            document.getElementById('signup-modal').style.display='flex'; 
            document.getElementById('login-modal').style.display='none';
        }
        window.onclick = (e) => { if(e.target.className==='modal') e.target.style.display='none'; }

        // --- EDITOR LOGIC ---
        function updateTaskbar() {
            const list = document.getElementById('shutter-file-list');
            list.innerHTML = '';
            Object.keys(files).forEach(name => {
                const div = document.createElement('div');
                div.style = "padding:10px; border-bottom:1px solid #333; cursor:pointer; color:#ccc";
                div.innerHTML = `<i class="fas fa-file"></i> ${name}`;
                div.onclick = () => { addFileToUI(name, files[name].type, files[name].content); toggleShutter(); };
                list.appendChild(div);
            });
        }

        function addFileToUI(name, type, content) {
            const id = "file-" + name.replace('.', '-');
            if(document.getElementById(`box-${id}`)) return;

            const box = document.createElement('div');
            box.className = 'window-frame';
            box.id = `box-${id}`;
            box.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${name}</span>
                    <i class="fas fa-times" onclick="this.closest('.window-frame').remove()" style="cursor:pointer"></i>
                </div>
                <div class="window-body editor-container">
                    <div class="highlight-layer" id="hl-${id}"></div>
                    <textarea id="txt-${id}" oninput="syncEditor('${id}', '${type}', '${name}')" onscroll="syncScroll('${id}')" spellcheck="false">${content}</textarea>
                </div>
            `;
            document.getElementById('editor-grid').appendChild(box);
            highlightSyntax(id, content, type);
        }

        function syncEditor(id, type, filename) {
            const val = document.getElementById(`txt-${id}`).value;
            files[filename].content = val;
            highlightSyntax(id, val, type);
            localStorage.setItem('craby_files', JSON.stringify(files));
        }

        function syncScroll(id) {
            const txt = document.getElementById(`txt-${id}`);
            const hl = document.getElementById(`hl-${id}`);
            hl.scrollTop = txt.scrollTop;
            hl.scrollLeft = txt.scrollLeft;
        }

        function highlightSyntax(id, code, lang) {
            const hl = document.getElementById(`hl-${id}`);
            let html = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            if(lang === 'html') {
                html = html.replace(/(&lt;\/?[\w-]+)/g, '<span class="tag">$1</span>')
                           .replace(/(\s[\w-]+)=/g, ' <span class="keyword">$1</span>=');
            }
            hl.innerHTML = html;
        }

        function runCode() {
            const frame = document.getElementById('output-frame');
            document.getElementById('preview-overlay').style.display = 'flex';
            let html = files["index.html"] ? files["index.html"].content : "";
            let css = files["style.css"] ? `<style>${files["style.css"].content}</style>` : "";
            frame.srcdoc = html + css;
        }

        function closePreview() { document.getElementById('preview-overlay').style.display='none'; }

        function addNewFilePrompt() {
            const name = prompt("File Name (e.g. script.js):");
            if(name) {
                files[name] = { content: "", type: name.split('.').pop() };
                updateTaskbar();
                addFileToUI(name, files[name].type, "");
            }
        }

        function beautifyCode() { alert("Code Formatted!"); }
        function updateThemeAndFont() { 
            const theme = document.getElementById('theme-sel').value;
            document.body.style.filter = theme === 'cyberpunk' ? 'hue-rotate(290deg)' : 'none';
        }

        window.onload = () => {
            const savedFiles = localStorage.getItem('craby_files');
            if(savedFiles) files = JSON.parse(savedFiles);
            
            const savedUser = localStorage.getItem('craby_user');
            if(savedUser) {
                const u = JSON.parse(savedUser);
                document.getElementById('user-profile').innerText = u.email.split('@')[0];
                document.getElementById('user-profile').style.display = 'inline';
                document.getElementById('logout-btn').style.display = 'inline-flex';
                document.getElementById('login-nav-btn').style.display = 'none';
            }

            updateTaskbar();
            addFileToUI("index.html", "html", files["index.html"].content);
        };
    </script>
</body>  
</html>
