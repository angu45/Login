<!DOCTYPE html>
<html lang="en">
<head>
    <title>Craby Editor Pro</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
<style>
/* ========================================
   CRABY EDITOR PRO - COMPREHENSIVE STYLES
   ======================================== */

/* --- CSS Variables --- */
:root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --bg-hover: #30363d;
    --accent: #ffb400;
    --accent-glow: rgba(255, 180, 0, 0.3);
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --border: rgba(255, 255, 255, 0.1);
    --border-accent: rgba(255, 180, 0, 0.3);
    --success: #3fb950;
    --error: #f85149;
    --warning: #d29922;
    --font-mono: 'Fira Code', monospace;
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --header-height: 60px;
    --footer-height: 45px;
    --sidebar-width: 280px;
    --toolbar-height: 50px;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 20px var(--accent-glow);
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* --- Theme Variables --- */
[data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eaeef2;
    --bg-hover: #d0d7de;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-muted: #8c959f;
    --border: rgba(27, 31, 36, 0.15);
}

[data-theme="monokai"] {
    --bg-primary: #272822;
    --bg-secondary: #3e3d32;
    --accent: #f92672;
    --accent-glow: rgba(249, 38, 114, 0.3);
}

[data-theme="dracula"] {
    --bg-primary: #282a36;
    --bg-secondary: #44475a;
    --accent: #bd93f9;
    --accent-glow: rgba(189, 147, 249, 0.3);
}

[data-theme="nord"] {
    --bg-primary: #2e3440;
    --bg-secondary: #3b4252;
    --accent: #88c0d0;
    --accent-glow: rgba(136, 192, 208, 0.3);
}

[data-theme="cyberpunk"] {
    --bg-primary: #0b0e14;
    --bg-secondary: #1a1f29;
    --accent: #00ff41;
    --accent-glow: rgba(0, 255, 65, 0.3);
}

[data-theme="matrix"] {
    --bg-primary: #000000;
    --bg-secondary: #001100;
    --accent: #00ff00;
    --accent-glow: rgba(0, 255, 0, 0.3);
}

[data-theme="midnight"] {
    --bg-primary: #020617;
    --bg-secondary: #1e293b;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.3);
}

[data-theme="synthwave"] {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --accent: #ff2a6d;
    --accent-glow: rgba(255, 42, 109, 0.3);
}

/* --- Reset & Base --- */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
}

/* --- Loader --- */
.loader {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    transition: opacity 0.5s, visibility 0.5s;
}

.loader.hidden {
    opacity: 0;
    visibility: hidden;
}

.loader-content {
    text-align: center;
}

.loader-icon {
    font-size: 80px;
    color: var(--accent);
    margin-bottom: 20px;
    animation: pulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 20px var(--accent));
}

.loader-text {
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 30px;
    text-shadow: 0 0 20px var(--accent-glow);
}

.loader-bar {
    width: 200px;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 10px;
    overflow: hidden;
    margin: 0 auto 15px;
}

.loader-progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #00e5ff);
    border-radius: 10px;
    transition: width 0.3s;
    box-shadow: 0 0 15px var(--accent);
}

.loader-percent {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-secondary);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* --- App Layout --- */
.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* --- Header --- */
.header {
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 100;
}

.header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.header-center {
    flex: 1;
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 0 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-icon {
    font-size: 28px;
    color: var(--accent);
    filter: drop-shadow(0 0 10px var(--accent));
    animation: float 3s ease-in-out infinite;
}

.logo-text {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: 2px;
}

.logo-sub {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: -5px;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
}

/* File Tabs */
.file-tabs {
    display: flex;
    gap: 5px;
}

.file-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-tertiary);
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid transparent;
    border-bottom: none;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
}

.file-tab:hover {
    background: var(--bg-hover);
}

.file-tab.active {
    background: var(--bg-primary);
    border-color: var(--border);
}

.file-tab .tab-icon {
    color: var(--accent);
    font-size: 12px;
}

.file-tab .tab-name {
    color: var(--text-primary);
}

.file-tab .tab-close {
    color: var(--text-muted);
    margin-left: 5px;
    transition: var(--transition);
}

.file-tab .tab-close:hover {
    color: var(--error);
}

/* Buttons */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.btn-icon {
    padding: 10px;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
}

.btn-icon:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
    color: var(--accent);
}

.btn-sm {
    padding: 6px;
}

.btn-primary {
    background: var(--accent);
    color: #000;
    box-shadow: var(--shadow-glow);
}

.btn-primary:hover {
    background: #fff;
    box-shadow: 0 0 25px var(--accent);
}

.btn-outline {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border);
}

.btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.btn-block {
    width: 100%;
}

.run-btn {
    background: linear-gradient(135deg, var(--accent), #ff8800);
    padding: 10px 24px;
    font-weight: 700;
}

.run-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px var(--accent);
}

/* --- Mobile Toolbar --- */
.mobile-toolbar {
    display: none;
    position: fixed;
    bottom: var(--footer-height);
    left: 0;
    right: 0;
    height: var(--toolbar-height);
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    justify-content: space-around;
    align-items: center;
    z-index: 90;
    padding: 0 10px;
}

.mobile-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 18px;
    cursor: pointer;
    transition: var(--transition);
}

.mobile-btn:hover, .mobile-btn:active {
    background: var(--accent);
    color: #000;
}

.mobile-btn-run {
    background: var(--accent);
    color: #000;
    width: 56px;
    height: 56px;
    font-size: 22px;
    box-shadow: var(--shadow-glow);
}

/* --- Main Content --- */
.main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
}

/* Sidebar */
.sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: var(--transition);
    z-index: 50;
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid var(--border);
}

.sidebar-header h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.file-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 15px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 5px;
}

.file-item:hover {
    background: var(--bg-hover);
}

.file-item.active {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
}

.file-item .file-icon {
    font-size: 18px;
    color: var(--accent);
}

.file-item .file-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.file-item .file-delete {
    color: var(--text-muted);
    opacity: 0;
    transition: var(--transition);
}

.file-item:hover .file-delete {
    opacity: 1;
}

.file-item .file-delete:hover {
    color: var(--error);
}

.sidebar-footer {
    padding: 15px;
    border-top: 1px solid var(--border);
}

/* Sidebar Toggle */
.sidebar-toggle {
    display: none;
    position: absolute;
    left: var(--sidebar-width);
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 60px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    cursor: pointer;
    z-index: 60;
    transition: var(--transition);
}

.sidebar-toggle i {
    color: var(--text-muted);
    transition: var(--transition);
}

.sidebar-toggle:hover {
    background: var(--bg-tertiary);
}

.sidebar-toggle:hover i {
    color: var(--accent);
}

.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 45;
}

/* Sidebar Collapsed */
.sidebar.collapsed {
    width: 0;
    overflow: hidden;
}

.sidebar.collapsed + .sidebar-toggle {
    left: 0;
}

.sidebar.collapsed ~ .sidebar-overlay {
    display: none;
}

/* --- Editor Area --- */
.editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-primary);
}

.editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    border-bottom: 1px solid var(--border);
}

.editor-panel:last-child {
    border-bottom: none;
}

.editor-panel.collapsed {
    flex: 0;
    min-height: auto;
}

.editor-panel.collapsed .editor-body {
    display: none;
}

.editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 15px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
}

.editor-title {
    display: flex;
    align-items: center;
    gap: 10px;
}

.editor-title .title-icon {
    color: var(--accent);
    font-size: 14px;
}

.editor-title .title-name {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
}

.editor-actions {
    display: flex;
    gap: 8px;
}

.editor-body {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
    background: var(--bg-primary);
}

.line-numbers {
    width: 50px;
    padding: 15px 10px;
    background: var(--bg-secondary);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    text-align: right;
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
}

.code-editor {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.code-editor .highlight-layer {
    position: absolute;
    inset: 0;
    padding: 15px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
    pointer-events: none;
    color: transparent;
}

.code-editor .edit-layer {
    position: absolute;
    inset: 0;
    padding: 15px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
    background: transparent;
    caret-color: var(--accent);
    color: var(--text-primary);
    outline: none;
    tab-size: 2;
}

.code-editor .edit-layer:focus {
    background: rgba(255, 255, 255, 0.02);
}

/* Syntax Highlighting */
.syntax-tag { color: #ff7b72; text-shadow: 0 0 8px rgba(255, 123, 114, 0.5); }
.syntax-attr { color: #79c0ff; text-shadow: 0 0 8px rgba(121, 192, 255, 0.5); }
.syntax-value { color: #a5d6ff; text-shadow: 0 0 5px rgba(165, 214, 255, 0.4); }
.syntax-selector { color: #ffb400; text-shadow: 0 0 8px rgba(255, 180, 0, 0.5); }
.syntax-property { color: #79c0ff; text-shadow: 0 0 8px rgba(121, 192, 255, 0.5); }
.syntax-value { color: #a5d6ff; }
.syntax-keyword { color: #ff7b72; text-shadow: 0 0 10px rgba(255, 123, 114, 0.6); font-weight: 600; }
.syntax-function { color: #d2a8ff; text-shadow: 0 0 10px rgba(210, 168, 255, 0.6); }
.syntax-string { color: #a5d6ff; text-shadow: 0 0 5px rgba(165, 214, 255, 0.4); }
.syntax-number { color: #f0883e; text-shadow: 0 0 8px rgba(240, 136, 62, 0.5); }
.syntax-comment { color: #8b949e; font-style: italic; }
.syntax-operator { color: #ff7b72; }
.syntax-variable { color: #ffa657; }
.syntax-punctuation { color: var(--text-muted); }

/* --- Settings Panel --- */
.settings-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 380px;
    height: 100%;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    box-shadow: -10px 0 30px rgba(0, 0, 0, 0.3);
}

.settings-panel.open {
    right: 0;
}

.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
}

.settings-header h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
}

.settings-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.settings-section {
    margin-bottom: 25px;
}

.settings-section h4 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
}

.setting-item {
    margin-bottom: 15px;
}

.setting-item label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.setting-item select,
.setting-item input[type="text"] {
    width: 100%;
    padding: 10px 15px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
}

.setting-item select:focus,
.setting-item input[type="text"]:focus {
    border-color: var(--accent);
}

.setting-item input[type="range"] {
    width: 100%;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 10px;
    outline: none;
    -webkit-appearance: none;
}

.setting-item input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--shadow-glow);
}

.color-picker {
    display: flex;
    gap: 10px;
}

.color-picker input[type="color"] {
    width: 50px;
    height: 40px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    background: transparent;
}

/* Toggle Switch */
.toggle-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.toggle-item label:first-child {
    margin-bottom: 0;
}

.toggle {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 26px;
}

.toggle input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: var(--bg-tertiary);
    border-radius: 26px;
    transition: var(--transition);
}

.toggle-slider::before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background: var(--text-primary);
    border-radius: 50%;
    transition: var(--transition);
}

.toggle input:checked + .toggle-slider {
    background: var(--accent);
}

.toggle input:checked + .toggle-slider::before {
    transform: translateX(22px);
    background: #000;
}

/* --- Preview Overlay --- */
.preview-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    z-index: 1000;
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.3s;
}

.preview-overlay.open {
    display: flex;
    opacity: 1;
}

.preview-header {
    height: 50px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
}

.preview-controls {
    display: flex;
    gap: 8px;
}

.preview-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: var(--transition);
}

.preview-dot:hover {
    transform: scale(1.2);
}

.preview-address {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 15px;
    background: var(--bg-primary);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 13px;
}

.preview-address i {
    color: var(--success);
}

.preview-actions {
    display: flex;
    align-items: center;
    gap: 10px;
}

.device-toggle {
    display: flex;
    background: var(--bg-tertiary);
    border-radius: var(--radius);
    padding: 3px;
}

.device-toggle .btn-icon {
    border: none;
    border-radius: 6px;
    background: transparent;
}

.device-toggle .btn-icon.active {
    background: var(--accent);
    color: #000;
}

.preview-body {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: #1e1e1e;
    padding: 20px;
    overflow: auto;
}

#preview-frame {
    width: 100%;
    height: 100%;
    background: #fff;
    border: none;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: width 0.3s;
}

#preview-frame.mobile {
    width: 375px;
    height: 812px;
    border-radius: 20px;
    border: 8px solid #333;
}

/* --- Console Panel --- */
.console-panel {
    position: fixed;
    bottom: -300px;
    left: var(--sidebar-width);
    right: 0;
    height: 300px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    z-index: 80;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
}

.console-panel.open {
    bottom: 0;
}

.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
}

.console-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 15px;
    font-family: var(--font-mono);
    font-size: 13px;
}

.console-log {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
}

.console-log.error {
    color: var(--error);
}

.console-log.warn {
    color: var(--warning);
}

.console-log.info {
    color: var(--accent);
}

/* --- Suggestions Box --- */
.suggestions-box {
    position: fixed;
    display: none;
    min-width: 200px;
    max-width: 300px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 500;
    overflow: hidden;
}

.suggestions-box.open {
    display: block;
}

.suggestions-header {
    padding: 8px 12px;
    background: var(--bg-tertiary);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
}

.suggestions-list {
    max-height: 200px;
    overflow-y: auto;
}

.suggestion-item {
    padding: 10px 12px;
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font-mono);
    font-size: 13px;
}

.suggestion-item:hover,
.suggestion-item.selected {
    background: var(--bg-hover);
    color: var(--accent);
}

/* --- Footer --- */
.footer {
    height: var(--footer-height);
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.footer-content {
    display: flex;
    align-items: center;
    gap: 20px;
}

.footer-text {
    font-size: 13px;
    color: var(--text-secondary);
}

.footer-text .fa-heart {
    color: var(--error);
    animation: heartbeat 1.5s ease-in-out infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.footer-links {
    display: flex;
    gap: 15px;
}

.footer-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-size: 14px;
    transition: var(--transition);
    text-decoration: none;
}

.footer-link:hover {
    background: var(--accent);
    color: #000;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px var(--accent-glow);
}

/* --- Responsive Design --- */
@media (max-width: 768px) {
    :root {
        --header-height: 55px;
        --sidebar-width: 85%;
        --footer-height: 40px;
    }
    
    .header {
        padding: 0 10px;
    }
    
    .header-left .logo-text,
    .header-left .logo-sub {
        display: none;
    }
    
    .header-center {
        display: none;
    }
    
    .header-right .btn span {
        display: none;
    }
    
    .run-btn {
        padding: 10px 14px;
    }
    
    .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        height: 100%;
        z-index: 150;
    }
    
    .sidebar.open {
        left: 0;
    }
    
    .sidebar-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .sidebar.collapsed + .sidebar-toggle {
        display: flex;
    }
    
    .sidebar-overlay.open {
        display: block;
    }
    
    .mobile-toolbar {
        display: flex;
    }
    
    .editor-panel {
        min-height: 150px;
    }
    
    .settings-panel {
        width: 100%;
        right: -100%;
    }
    
    .footer-text {
        font-size: 11px;
    }
    
    .footer-links {
        gap: 10px;
    }
    
    .footer-link {
        width: 28px;
        height: 28px;
        font-size: 12px;
    }
}

@media (max-width: 480px) {
    .btn-icon {
        padding: 8px;
    }
    
    .preview-header {
        padding: 0 10px;
        gap: 10px;
    }
    
    .preview-controls {
        display: none;
    }

    }
}

/* --- Utilities --- */

.glass-effect {

}

document.addEventListener('DOMContentLoaded', () => {

function initializeApp() {
    // Show loader

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('app').style.display = 'flex';
        
        // Load saved data
        loadSavedData();
        
        // Initialize UI
        renderFileList();

function simulateLoading(callback) {
    const progress = document.getElementById('loader-progress');
    const percent = document.getElementById('loader-percent');
    let value = 0;
    
    const interval = setInterval(() => {
        value += Math.random() * 15;
        if (value >= 100) {
            value = 100;
            clearInterval(interval);
            setTimeout(callback, 300);
        }
        progress.style.width = value + '%';
        percent.textContent = Math.floor(value) + '%';
    }, 100);
}

function loadSavedData() {
    const savedFiles = localStorage.getItem('craby_files');
    const savedSettings = localStorage.getItem('craby_settings');
    
    if (savedFiles) {
        try {
            AppState.files = JSON.parse(savedFiles);
        } catch (e) {
            console.error('Failed to load saved files:', e);

    if (savedSettings) {
        try {
            AppState.settings = { ...AppState.settings, ...JSON.parse(savedSettings) };
        } catch (e) {
            console.error('Failed to load settings:', e);
        }
    }
}

function saveToLocalStorage() {
    localStorage.setItem('craby_files', JSON.stringify(AppState.files));

function setupEditorListeners() {
    document.querySelectorAll('.edit-layer').forEach(editor => {
        const fileName = editor.dataset.file;
        const fileType = editor.dataset.type;
        
        // Input event for real-time highlighting
        editor.addEventListener('input', (e) => {
            const content = editor.textContent;
            AppState.files[fileName].content = content;
            updateHighlight(editor.id, fileType);
            updateLineNumbersFor(fileName.replace('.', '-'));
        });
        
        // Keydown for special keys
        editor.addEventListener('keydown', (e) => {
            handleSpecialKeys(e, editor);
        });
        
        // Tab handling
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                if (e.shiftKey) {
                    // Outdent (simplified)
                    document.execCommand('outdent');
                } else {
                    // Indent with spaces
                    document.execCommand('insertText', false, '  ');
                }
            }
        });
        
        // Scroll sync
        editor.addEventListener('scroll', () => {
            const highlightLayer = document.getElementById('highlight-' + editor.id.replace('edit-', ''));
            const linesEl = document.getElementById('lines-' + editor.id.replace('edit-', ''));
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
            if (linesEl) {
                linesEl.scrollTop = editor.scrollTop;
            }
        });
    });
}

function handleSpecialKeys(e, editor) {
    const fileType = editor.dataset.type;
    
    // Auto-close brackets
    if (AppState.settings.autoBrackets) {
        const pairs = {
            '{': '}',
            '(': ')',
            '[': ']',
            '"': '"',
            "'": "'",
            '<': '>'
        };
        
        if (pairs[e.key]) {
            e.preventDefault();
            const selection = window.getSelection();
            const range = selection.getRangeAt(0);
            const cursorPos = range.startOffset;
            
            const before = editor.textContent.substring(0, cursorPos);
            const after = editor.textContent.substring(cursorPos);
            
            editor.textContent = before + e.key + pairs[e.key] + after;
            
            // Move cursor between brackets
            range.setStart(editor.firstChild, cursorPos + 1);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);
            
            AppState.files[editor.dataset.file].content = editor.textContent;
            updateHighlight(editor.id, fileType);
        }
    }
    
    // Enter key for auto-indent
    if (e.key === 'Enter' && fileType !== 'html') {
        e.preventDefault();
        const selection = window.getSelection();
        const range = selection.getRangeAt(0);
        const cursorPos = range.startOffset;
        const text = editor.textContent;
        
        // Find current line
        const beforeCursor = text.substring(0, cursorPos);
        const lineStart = beforeCursor.lastIndexOf('\n') + 1;
        const currentLine = beforeCursor.substring(lineStart);
        
        // Calculate indentation
        let indent = '';
        for (let char of currentLine) {
            if (char === ' ' || char === '\t') indent += char;
            else break;
        }
        
        // Check if line ends with opening brace
        const trimmedLine = currentLine.trim();
        if (trimmedLine.endsWith('{') || trimmedLine.endsWith('(') || trimmedLine.endsWith('[')) {
            indent += '  ';
        }
        
        editor.textContent = text.substring(0, cursorPos) + '\n' + indent + text.substring(cursorPos);
        
        // Move cursor to new position
        const newPos = cursorPos + 1 + indent.length;
        range.setStart(editor.firstChild, newPos);
        range.collapse(true);
        selection.removeAllRanges();
        selection.addRange(range);
        
        AppState.files[editor.dataset.file].content = editor.textContent;
        updateHighlight(editor.id, fileType);
        updateLineNumbersFor(editor.id.replace('edit-', ''));
    }
}

// ==========================================
// SYNTAX HIGHLIGHTING
// ==========================================

function updateHighlight(editorId, type) {
    const editor = document.getElementById(editorId);
    const highlightLayer = document.getElementById('highlight-' + editorId.replace('edit-', ''));
    
    if (!editor || !highlightLayer) return;
    
    const content = editor.textContent;
    let highlighted = '';
    
    switch (type) {
        case 'html':
            highlighted = highlightHTML(content);
            break;
        case 'css':
            highlighted = highlightCSS(content);
            break;
        case 'js':
            highlighted = highlightJS(content);
            break;
    }
    
    highlightLayer.innerHTML = highlighted;
}

function updateAllHighlights() {
    document.querySelectorAll('.edit-layer').forEach(editor => {
        updateHighlight(editor.id, editor.dataset.type);
    });
}

function highlightHTML(code) {
    // Escape HTML first
    let escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    
    // Comments
    escaped = escaped.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="syntax-comment">$1</span>');
    
    // Doctype
    escaped = escaped.replace(/(&lt;!DOCTYPE[^&]*&gt;)/gi, '<span class="syntax-keyword">$1</span>');
    
    // Tags
    escaped = escaped.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="syntax-tag">$2</span>');
    
    // Attributes
    escaped = escaped.replace(/\s([\w-]+)(=)/g, ' <span class="syntax-attr">$1</span>$2');
    
    // Attribute values
    escaped = escaped.replace(/(=)(&quot;|")([^&]*?)($2)/g, '$1<span class="syntax-value">$3</span>');
    
    return escaped;
}

function highlightCSS(code) {
    let escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    
    // Comments
    escaped = escaped.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="syntax-comment">$1</span>');
    
    // Selectors (before {)
    escaped = escaped.replace(/^([^{]+)(\{)/gm, '<span class="syntax-selector">$1</span>$2');
    
    // Properties
    escaped = escaped.replace(/([\w-]+)(\s*:)/g, '<span class="syntax-property">$1</span>$2');
    
    // Values (after : until ; or })
    escaped = escaped.replace(/:([^;{}]+)/g, ':<span class="syntax-value">$1</span>');
    
    // Numbers
    escaped = escaped.replace(/(:\s*)(-?\d+(\.\d+)?(px|em|rem|%|vh|vw|s|ms)?)/g, '$1<span class="syntax-number">$2</span>');
    
    // Colors (hex)
    escaped = escaped.replace(/(#[0-9a-fA-F]{3,8})/g, '<span class="syntax-number">$1</span>');
    
    return escaped;
}

function highlightJS(code) {
    let escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    
    // Comments
    escaped = escaped.replace(/(\/\/[^\n]*)/g, '<span class="syntax-comment">$1</span>');
    escaped = escaped.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="syntax-comment">$1</span>');
    
    // Strings
    escaped = escaped.replace(/(&quot;[^&]*?&quot;)/g, '<span class="syntax-string">$1</span>');
    escaped = escaped.replace(/(&#39;[^&]*?&#39;)/g, '<span class="syntax-string">$1</span>');
    escaped = escaped.replace(/(`[^`]*?`)/g, '<span class="syntax-string">$1</span>');
    
    // Keywords
    const keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'break', 'continue', 'default', 'try', 'catch', 'finally', 'throw', 'new', 'this', 'class', 'extends', 'super', 'import', 'export', 'from', 'as', 'async', 'await', 'yield', 'static', 'get', 'set', 'of', 'in', 'typeof', 'instanceof', 'delete', 'void', 'null', 'undefined', 'true', 'false', 'NaN', 'Infinity'];
    keywords.forEach(kw => {
        const regex = new RegExp(`\\b(${kw})\\b`, 'g');
        escaped = escaped.replace(regex, '<span class="syntax-keyword">$1</span>');
    });
    
    // Functions
    escaped = escaped.replace(/([\w.]+)\s*\(/g, '<span class="syntax-function">$1</span>(');
    
    // Numbers
    escaped = escaped.replace(/\b(\d+(\.\d+)?)\b/g, '<span class="syntax-number">$1</span>');
    
    return escaped;
}

// LINE NUMBERS
// ==========================================

function updateLineNumbers() {
    Object.keys(AppState.files).forEach(name => {
        updateLineNumbersFor(name.replace('.', '-'));
    });
}

function updateLineNumbersFor(editorId) {
    const linesEl = document.getElementById('lines-' + editorId);
    const editorEl = document.getElementById('edit-' + editorId);
    
    if (!linesEl || !editorEl) return;
    
    const lines = editorEl.textContent.split('\n').length;
    let lineNumbers = '';
    
    for (let i = 1; i <= lines; i++) {
        lineNumbers += i + '\n';
    }
    
    linesEl.textContent = lineNumbers;
}

// ==========================================
// FILE MANAGEMENT
// ==========================================

function switchToFile(fileName) {
    AppState.activeFile = fileName;
    
    // Update file list
    renderFileList();
    
    // Update tabs
    renderFileTabs();
    
    // Focus editor
    const editorEl = document.getElementById('edit-' + fileName.replace('.', '-'));
    if (editorEl) {
        editorEl.focus();
    }
    
    // Close sidebar on mobile
    if (window.innerWidth < 768) {
        toggleSidebar();
    }
}

function addNewFile() {
    const fileName = prompt('Enter file name (e.g., utils.js):');
    
    if (!fileName) return;
    
    if (AppState.files[fileName]) {
        alert('File already exists!');
        return;
    }
    
    const ext = fileName.split('.').pop().toLowerCase();
    const typeMap = { html: 'html', css: 'css', js: 'js' };
    
    if (!typeMap[ext]) {
        alert('Unsupported file type. Use .html, .css, or .js');
        return;
    }
    
    const templates = {
        html: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${fileName}</title>
</head>
<body>
    
</body>
</html>`,
        css: `/* ${fileName} */\n`,
        js: `// ${fileName}\n`
    };
    
    AppState.files[fileName] = {
        type: typeMap[ext],
        content: templates[typeMap[ext]],
        visible: true
    };
    
    renderFileList();
    renderFileTabs();
    renderEditors();
    switchToFile(fileName);
    saveToLocalStorage();
}

function deleteFile(fileName) {
    if (Object.keys(AppState.files).length <= 1) {
        alert('Cannot delete the last file!');
        return;
    }
    
    if (!confirm(`Delete ${fileName}?`)) return;
    
    delete AppState.files[fileName];
    
    if (AppState.activeFile === fileName) {
        AppState.activeFile = Object.keys(AppState.files)[0];
    }
    
    renderFileList();
    renderFileTabs();
    renderEditors();
    saveToLocalStorage();
}

function runCode() {
    const overlay = document.getElementById('preview-overlay');
    const frame = document.getElementById('preview-frame');
    
    // Build combined HTML
    let html = AppState.files['index.html']?.content || '<html><body></body></html>';
    const css = AppState.files['style.css']?.content || '';
    const js = AppState.files['script.js']?.content || '';

// ==========================================
// CODE FORMATTING (BEAUTIFY)
// ==========================================

function beautifyCode() {
    Object.entries(AppState.files).forEach(([name, data]) => {
        let formatted = data.content;
        
        switch (data.type) {
            case 'html':
                formatted = beautifyHTML(formatted);
                break;
            case 'css':
                formatted = beautifyCSS(formatted);
                break;
            case 'js':
                formatted = beautifyJS(formatted);
                break;
        }
        
        AppState.files[name].content = formatted;
    });
    
    renderEditors();
    addConsoleLog('Code beautified!', 'info');
    saveToLocalStorage();
}

function beautifyHTML(html) {
    let formatted = '';
    let indent = 0;
    
    // First pass: normalize whitespace
    html = html.replace(/>\s+</g, '><').trim();
    
    // Second pass: add newlines and indent
    const tokens = html.split(/(<[^>]+>)/);
    
    tokens.forEach(token => {
        if (!token.trim()) return;
        
        if (token.match(/^<\/\w/)) {
            // Closing tag
            indent--;
        }
        
        formatted += '  '.repeat(Math.max(0, indent)) + token.trim() + '\n';
        
        if (token.match(/^<\w[^>]*[^\/]>$/)) {
            // Opening tag (not self-closing)
            indent++;
        }
    });
    
    return formatted.trim();
}

function beautifyCSS(css) {
    // Add newlines after {
    css = css.replace(/\s*{\s*/g, ' {\n  ');
    
    // Add newlines before }
    css = css.replace(/\s*}\s*/g, '\n}\n\n');
    
    // Add newlines after ;
    css = css.replace(/;\s*/g, ';\n  ');
    
    // Clean up extra whitespace
    css = css.replace(/\n\s*\n/g, '\n');
    
    // Trim each line
    css = css.split('\n').map(line => line.trim()).join('\n');
    
    return css.trim() + '\n';
}

function beautifyJS(js) {
    // Add spaces around operators
    js = js.replace(/\s*([{};,:])\s*/g, '$1 ');
    js = js.replace(/\s*([=+\-*\/<>!&|%^~?])\s*/g, ' $1 ');
    
    // Add newlines after {
    js = js.replace(/\s*{\s*/g, ' {\n  ');
    
    // Add newlines before }
    js = js.replace(/\s*}\s*/g, '\n}\n');
    
    // Add newlines after ;
    js = js.replace(/;\s*/g, ';\n');
    
    // Clean up extra whitespace
    js = js.replace(/\n\s*\n/g, '\n');
    
    // Trim each line
    js = js.split('\n').map(line => line.trim()).filter(line => line).join('\n');
    
    return js.trim() + '\n';
}

// ==========================================

function downloadAll() {
    Object.entries(AppState.files).forEach(([name, data]) => {
        downloadFile(name, data.content);
    });
    addConsoleLog('All files downloaded!', 'info');
}

function downloadFile(fileName, content) {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ==========================================
// SUGGESTIONS
// ==========================================

let suggestionIndex = 0;
let currentSuggestions = [];

function showSuggestions(editor, query) {
    if (!AppState.settings.suggestions) return;
    
    const type = editor.dataset.type;
    const dict = Dictionary[type] || [];
    const matches = dict.filter(item => item.toLowerCase().startsWith(query.toLowerCase()));
    
    if (matches.length === 0) {
        hideSuggestions();
        return;
    }
    
    currentSuggestions = matches;
    suggestionIndex = 0;
    
    const box = document.getElementById('suggestions-box');
    const list = document.getElementById('suggestions-list');
    
    list.innerHTML = matches.map((item, i) => `
        <div class="suggestion-item ${i === 0 ? 'selected' : ''}" 
             onclick="insertSuggestion('${item}')"
             onmouseenter="selectSuggestion(${i})">
            ${item}
        </div>
    `).join('');
    
    // Position box
    const rect = editor.getBoundingClientRect();
    box.style.top = (rect.bottom + 5) + 'px';
    box.style.left = rect.left + 'px';
    box.classList.add('open');
}

function hideSuggestions() {
    document.getElementById('suggestions-box').classList.remove('open');
}

function selectSuggestion(index) {
    suggestionIndex = index;
    document.querySelectorAll('.suggestion-item').forEach((item, i) => {
        item.classList.toggle('selected', i === index);
    });
}

function insertSuggestion(text) {
    const editor = document.querySelector('.edit-layer:focus');
    if (!editor) return;
    
    const selection = window.getSelection();
    const range = selection.getRangeAt(0);
    
    // Replace current word
    const textContent = editor.textContent;
    const cursorPos = range.startOffset;
    
    // Find word start
    let wordStart = cursorPos;
    while (wordStart > 0 && !/\s/.test(textContent[cursorPos - (cursorPos - wordStart)])) {
        wordStart--;
        if (wordStart === 0) break;
    }
    
    // Find word end
    let wordEnd = cursorPos;
    while (wordEnd < textContent.length && !/\s/.test(textContent[wordEnd])) {
        wordEnd++;
    }
    
    // Replace word
    editor.textContent = textContent.substring(0, wordStart) + text + textContent.substring(wordEnd);
    
    // Update state
    AppState.files[editor.dataset.file].content = editor.textContent;
    
    // Move cursor
    range.setStart(editor.firstChild, wordStart + text.length);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
    
    updateHighlight(editor.id, editor.dataset.type);
    hideSuggestions();
}

// ==========================================
// UTILITY FUNCTIONS
// ==========================================

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function setupEventListeners() {
    // Global keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + S = Save
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveToLocalStorage();
            addConsoleLog('Saved to local storage', 'info');
        }
        
        // Ctrl/Cmd + Enter = Run
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            runCode();
        }
        
        // Escape = Close panels
        if (e.key === 'Escape') {
            closePreview();
            hideSuggestions();
            const settingsPanel = document.getElementById('settings-panel');
            if (settingsPanel.classList.contains('open')) {
                settingsPanel.classList.remove('open');
            }
        }
    });
    
    // Hide suggestions on click outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.suggestions-box') && !e.target.closest('.edit-layer')) {
            hideSuggestions();
        }
    });
    
    // Touch swipe for sidebar (mobile)
    let touchStartX = 0;
    let touchEndX = 0;
    
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    
    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    });
    
    function handleSwipe() {
        const swipeDistance = touchEndX - touchStartX;
        const sidebar = document.getElementById('sidebar');
        
        if (swipeDistance > 100 && touchStartX < 50) {
            // Swipe right from left edge - open sidebar
            sidebar.classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('open');
        } else if (swipeDistance < -100) {
            // Swipe left - close sidebar
            sidebar.classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }
    }
    
    // Window resize
    window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }
    });
}

// ==========================================
// INTERCEPT CONSOLE LOGS IN PREVIEW
// ==========================================

(function() {
    const originalConsole = { ...console };
    
    ['log', 'error', 'warn', 'info'].forEach(method => {
        console[method] = (...args) => {
            originalConsole[method](...args);
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            addConsoleLog(`[${method.toUpperCase()}] ${message}`, method === 'error' ? 'error' : method === 'warn' ? 'warn' : 'log');
        };
    });
})();

// Make addConsoleLog globally available
window.addConsoleLog = addConsoleLog;</script>
